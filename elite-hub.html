.quote-box{background:linear-gradient(135deg,#17171f 0%,#0e0e16 100%);border:1px solid #22222e;border-radius:14px;padding:22px 24px 20px;margin-bottom:18px;cursor:pointer;position:relative;overflow:hidden;user-select:none;-webkit-user-select:none;min-height:118px;display:flex;flex-direction:column;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 4px 24px rgba(0,0,0,.25)}
.quote-box::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#f5c842,#ff6b35)}
.quote-box::after{content:'"';position:absolute;top:-18px;right:18px;font-family:'Fraunces',Georgia,serif;font-size:5.5rem;color:rgba(245,200,66,.07);line-height:1;font-weight:500;pointer-events:none}
.quote-text{font-family:'Fraunces',Georgia,'Times New Roman',serif;font-size:1.08rem;line-height:1.42;color:#ece7d8;font-weight:400;transition:opacity .5s ease;letter-spacing:.2px;position:relative;z-index:1}
.quote-author{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:#8a8a9a;margin-top:14px;font-weight:700;transition:opacity .5s ease;position:relative;z-index:1}
.quote-box.fading .quote-text,.quote-box.fading .quote-author{opacity:0}
.quote-dots{position:absolute;bottom:10px;right:14px;font-size:.48rem;color:#2a2a3a;letter-spacing:2px;opacity:.7}

/* Sections */
.section{display:none}
.section.active{display:block}

/* ===== SCORECARD ===== */
.score-ring{position:relative;width:160px;height:160px;margin:0 auto 10px;transition:filter .4s}
.score-ring.elite{filter:drop-shadow(0 0 16px rgba(245,200,66,.35))}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .bg{fill:none;stroke:#1a1a24;stroke-width:8}
.score-ring .fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s,stroke .3s}
.score-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-num{font-size:2.8rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.score-den{font-size:.68rem;color:#666;margin-top:2px}
.score-lbl{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;margin-top:5px;font-weight:800}
.target-line{font-size:.68rem;text-align:center;color:#555;margin-bottom:16px;letter-spacing:.5px}
.target-line b{color:#f5c842;font-weight:700}

/* Category breakdown */
.cat-breakdown{margin-bottom:18px;padding:12px 14px;background:var(--card-deep);border:1px solid var(--border-soft);border-radius:11px}
.cat-hdr{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:#555;font-weight:700;margin-bottom:10px}
.cat-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:.72rem}
.cat-name{flex:0 0 90px;color:#aaa;font-weight:500;font-size:.72rem}
.cat-bar{flex:1;height:5px;background:#1a1a24;border-radius:3px;overflow:hidden}
.cat-fill{height:100%;border-radius:3px;transition:width .5s ease,background .3s}
.cat-pts{flex:0 0 48px;text-align:right;color:#666;font-size:.68rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.5px}

/* Misses card */
.miss-card{background:linear-gradient(135deg,#14141e,#1a1014);border:1px solid #2a1a24;border-radius:13px;padding:14px 16px;margin:16px 0}
.miss-title{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-soft);font-weight:800;margin-bottom:3px}
.miss-sub{font-size:.67rem;color:#555;margin-bottom:10px;font-style:italic;line-height:1.4}
.miss-note{width:100%;background:var(--card-deep);border:1px solid #1a1a2a;border-radius:7px;color:var(--text-soft);font-family:inherit;font-size:.82rem;padding:10px 11px;outline:none;resize:vertical;min-height:60px;transition:border-color .2s;line-height:1.5}
.miss-note:focus{border-color:#6a4a4a}
.miss-note::placeholder{color:#2a2a3a;font-style:italic}

.check-item{display:flex;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;cursor:pointer;transition:all .2s;user-select:none;-webkit-user-select:none}
/* Minimal Mode: strip the score section to weigh-in, run, protein */
#sec-score.minimal .cat-breakdown,#sec-score.minimal .sup-card,#sec-score.minimal .custom-edit,#sec-score.minimal .tox-card,#sec-score.minimal .kw-card,#sec-score.minimal .miss-card,#sec-score.minimal .trig-card{display:none}
.check-item:hover{background:#1a1a28}
.check-item.checked{border-color:#2a3a2a;background:#0f1a0f}
.check-item.na{opacity:.35;cursor:default}
.chkbox{width:20px;height:20px;border-radius:5px;border:2px solid #3a3a4a;margin-right:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.check-item.checked .chkbox{background:#4CAF50;border-color:#4CAF50}
.chkbox svg{width:12px;height:12px;opacity:0;transition:opacity .2s}
.check-item.checked .chkbox svg{opacity:1}
.chk-label{flex:1;font-size:.85rem;font-weight:500}
.chk-detail{font-size:.65rem;color:#444;margin-left:auto;padding-left:8px;white-space:nowrap}
.check-item.checked .chk-detail{color:#4a7a4a}
.na-tag{font-size:.55rem;color:#444;background:#1a1a24;padding:2px 7px;border-radius:6px;margin-left:auto}

.streak-row{display:flex;gap:8px;margin:18px 0}
.streak-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px;text-align:center}
.streak-val{font-size:1.3rem;font-weight:800}
.streak-lbl{font-size:.6rem;color:#555;letter-spacing:1px;text-transform:uppercase;margin-top:2px}

.week-box{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;margin-bottom:16px}
.week-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.week-title{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:#666}
.week-total{font-size:.8rem;font-weight:700}
.week-bars{display:flex;gap:5px;align-items:flex-end;height:70px}
.wday{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.bar-w{width:100%;height:55px;display:flex;align-items:flex-end;justify-content:center}
.bar{width:100%;max-width:34px;border-radius:4px 4px 0 0;transition:height .3s,background .3s;min-height:2px;cursor:pointer}
.bar:hover{opacity:.85}
.bar-sc{font-size:.55rem;color:#666;margin-bottom:2px;font-weight:600}
.day-lbl{font-size:.6rem;color:#444;margin-top:5px;font-weight:600}
.day-lbl.act{color:#f5c842}

/* ===== JOURNAL ===== */
.j-tabs{display:flex;gap:5px;margin-bottom:18px;background:var(--card);border-radius:9px;padding:3px}
.j-tab{flex:1;text-align:center;padding:7px;font-size:.7rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-radius:7px;cursor:pointer;color:#444;transition:all .2s;border:none;background:none}
.j-tab:hover{color:#888}
.j-tab.active{background:#1e1e30;color:#7c8cf5}

.prompt-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px 18px;margin-bottom:10px;transition:border-color .2s}
.prompt-card:focus-within{border-color:#3a3a5a}
.prompt-q{font-size:.88rem;font-weight:600;margin-bottom:8px;color:var(--text-soft);line-height:1.4}
.prompt-hint{font-size:.65rem;color:#3a3a4a;margin-bottom:8px;font-style:italic}
textarea,.j-input{width:100%;background:var(--card-deep);border:1px solid #1a1a2a;border-radius:7px;color:var(--text-soft);font-family:inherit;font-size:.85rem;line-height:1.6;padding:10px 12px;resize:vertical;min-height:70px;transition:border-color .2s;outline:none}
textarea:focus,.j-input:focus{border-color:#4a4a6a}
textarea::placeholder,.j-input::placeholder{color:#2a2a3a}
.j-input{min-height:40px;resize:none}

.grat-list{display:flex;flex-direction:column;gap:7px}
.grat-item{display:flex;align-items:center;gap:9px}
.grat-num{font-size:.75rem;font-weight:700;color:#7c8cf5;min-width:16px}
.grat-item input{flex:1;background:var(--card-deep);border:1px solid #1a1a2a;border-radius:7px;color:var(--text-soft);font-family:inherit;font-size:.85rem;padding:9px 12px;outline:none;transition:border-color .2s}
.grat-item input:focus{border-color:#4a4a6a}
.grat-item input::placeholder{color:#2a2a3a}

.slider-wrap{display:flex;align-items:center;gap:12px}
.slider-track{flex:1}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:#1a1a2a;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#7c8cf5;cursor:pointer;border:2px solid #0a0a0f}
.slider-val{font-size:1.4rem;font-weight:800;min-width:36px;text-align:center}
.slider-labels{display:flex;justify-content:space-between;margin-top:3px}
.slider-labels span{font-size:.55rem;color:#3a3a4a}

.mood-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.mood-pill{padding:5px 12px;border-radius:18px;font-size:.72rem;font-weight:600;border:1px solid var(--border-strong);background:var(--card-alt);color:#666;cursor:pointer;transition:all .2s}
.mood-pill:hover{border-color:#3a3a5a;color:#999}
.mood-pill.sel{border-color:#7c8cf5;color:#7c8cf5;background:#1a1a30}

.save-ind{text-align:center;font-size:.6rem;color:#2a2a3a;margin-bottom:14px;transition:color .3s}
.save-ind.on{color:#4a7a4a}

.hist-title{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:#444;margin:18px 0 10px}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 16px;margin-bottom:7px;cursor:pointer;transition:all .2s}
.hist-card:hover{border-color:#2e2e45;background:var(--card-hover)}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.hist-date{font-size:.8rem;font-weight:600}
.hist-score{font-size:.75rem;font-weight:700}
.hist-preview{font-size:.7rem;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-type{font-size:.5rem;padding:2px 6px;border-radius:5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-left:6px}

/* ===== WORKOUT ===== */
.wo-header{text-align:center;margin-bottom:16px}
.wo-day-name{font-size:1.1rem;font-weight:700;color:#4CAF50;margin-bottom:2px}
.wo-day-sub{font-size:.7rem;color:#555;letter-spacing:1px}
.wo-rest{text-align:center;padding:40px 20px;color:#444}
.wo-rest-icon{font-size:2rem;margin-bottom:10px}
.wo-rest h3{font-size:1rem;margin-bottom:6px;color:#666}
.wo-rest p{font-size:.8rem}

.wo-group{margin-bottom:18px}
.wo-group-title{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:8px;padding-left:2px}
.wo-exercise{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.wo-ex-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.wo-ex-name{font-size:.88rem;font-weight:600;color:var(--text-soft)}
.wo-ex-target{font-size:.68rem;color:#555}
.wo-sets{display:flex;flex-direction:column;gap:5px}
.wo-set-row{display:flex;align-items:center;gap:8px}
.wo-set-num{font-size:.7rem;font-weight:600;color:#444;min-width:30px}
.wo-set-input{width:65px;background:var(--card-deep);border:1px solid #1a1a2a;border-radius:6px;color:var(--text-soft);font-family:inherit;font-size:.82rem;padding:7px 8px;text-align:center;outline:none;transition:border-color .2s}
.wo-set-input:focus{border-color:#4a6a4a}
.wo-set-input::placeholder{color:#2a2a3a}
.wo-x{font-size:.7rem;color:#444}
.wo-check{width:22px;height:22px;border-radius:5px;border:2px solid #2a3a2a;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-left:auto;flex-shrink:0}
.wo-check.done{background:#4CAF50;border-color:#4CAF50}
.wo-check svg{width:12px;height:12px;opacity:0}
.wo-check.done svg{opacity:1}
.wo-lbl{font-size:.6rem;color:#444;text-align:center}

.wo-note{margin-top:12px}
.wo-note textarea{min-height:50px}
.wo-note-lbl{font-size:.7rem;color:#555;margin-bottom:5px}

.wo-progress{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:14px}
.wo-prog-title{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:10px}
.wo-prog-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border-soft)}
.wo-prog-row:last-child{border:none}
.wo-prog-name{font-size:.78rem;color:#aaa}
.wo-prog-val{font-size:.78rem;font-weight:600;color:#4CAF50}

.wo-timer{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.wo-timer-btn{background:#1a2a1a;border:1px solid #2a3a2a;color:#4CAF50;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.75rem;font-weight:600;transition:all .2s}
.wo-timer-btn:hover{background:#2a3a2a}
.wo-timer-display{font-size:1.4rem;font-weight:700;font-variant-numeric:tabular-nums;min-width:70px;text-align:center;color:#666}
.wo-timer-display.running{color:#4CAF50}
</style>
</head>
<body>

<script>
// ===== CONSTANTS =====
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],FDAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let curDate=new Date();curDate.setHours(0,0,0,0);
let curSec='score', jMode='daily', timerInterval=null, timerSec=90, timerTarget=90, timerRunning=false;

// ===== QUOTES =====
const QUOTES=[
  {t:"You do not rise to the level of your goals. You fall to the level of your systems.",a:"James Clear"},

  {t:"Rest at the end, not in the middle.",a:""},
  {t:"The standard you walk past is the standard you accept.",a:"David Morrison"},
  {t:"Either you run the day, or the day runs you.",a:"Jim Rohn"},
  {t:"Discipline is the bridge between goals and accomplishment.",a:"Jim Rohn"},
  {t:"What's easy to do is also easy not to do.",a:"Jim Rohn"},

  {t:"Hard times create strong men. Strong men create good times.",a:"G. Michael Hopf"},
  {t:"The pain you feel today will be the strength you feel tomorrow.",a:"Arnold Schwarzenegger"},
  {t:"Strength does not come from winning. Your struggles develop your strengths.",a:"Arnold Schwarzenegger"},
  {t:"Excellence is the gradual result of always striving to do better.",a:"Pat Riley"},

  {t:"You must do the thing you think you cannot do.",a:"Eleanor Roosevelt"},
  {t:"Show up on the days you don't feel like it. That's where it's built.",a:""},
  {t:"Be so good they can't ignore you.",a:"Steve Martin"},

// ===== 100-DAY MISSION =====
function get100Start(){
  let s=localStorage.getItem('eh_100day_start');
  if(!s){const t=new Date();t.setHours(0,0,0,0);t.setDate(t.getDate()+1);s=dk(t);localStorage.setItem('eh_100day_start',s)}
  return s;
}
function render100Day(){
  const slot=document.getElementById('d100Slot');if(!slot)return;
  const startStr=get100Start();
  const [y,m,dd]=startStr.split('-').map(Number);
  const start=new Date(y,m-1,dd);start.setHours(0,0,0,0);
  const end=new Date(start);end.setDate(end.getDate()+99);
  const today=new Date();today.setHours(0,0,0,0);
  const dayNum=Math.floor((today-start)/86400000)+1;
  const endLbl=`${MO[end.getMonth()]} ${end.getDate()}`;
  const startLbl=`${MO[start.getMonth()]} ${start.getDate()}`;
  if(dayNum<1){
    const until=Math.abs(dayNum-1);
    slot.innerHTML=`<div class="d100-card">
      <div class="d100-hdr"><div class="d100-title">100-Day Build</div><div class="d100-status">Pre-launch</div></div>
      <div class="d100-pre">Starts <b>${startLbl}</b> — ${until===0?'tomorrow':until+' days to go'}. Ends <b>${endLbl}</b>.</div>
    </div>`;
    return;
  }
  if(dayNum>100){
    slot.innerHTML=`<div class="d100-card">
      <div class="d100-hdr"><div class="d100-title">100-Day Build</div><div class="d100-status">Complete</div></div>
      <div class="d100-pre">Mission ended <b>${endLbl}</b>. Start a new 100 in Settings.</div>
    </div>`;
    return;
  }
  // Active — compute avg score during window up to today
  let sum=0,cnt=0,strong=0;
  for(let i=0;i<dayNum;i++){
    const d=new Date(start);d.setDate(d.getDate()+i);
    if(hasLogged(d)){const s=scoreDay100(d);sum+=s;cnt++;if(s>=80)strong++}
  }
  const avg=cnt>0?Math.round(sum/cnt):0;
  const pct=(dayNum/100)*100;
  const avgCol=cnt>0?zone100(avg).color:'#555';
  // Timeline: 100 tiles
  let tiles='';
  for(let i=0;i<100;i++){
    const td=new Date(start);td.setDate(td.getDate()+i);td.setHours(0,0,0,0);
    const future=td>today;
    const isT=dk(td)===dk(today);
    const logged=!future&&hasLogged(td);
    let cls='d100-tile',style='';
    if(isT)cls+=' today';
    else if(future)cls+=' future';
    else if(!logged)cls+=' missed';
    else{style='background:'+zone100(scoreDay100(td)).color}
    tiles+=`<div class="${cls}" data-td="${dk(td)}" style="${style}" title="Day ${i+1}"></div>`;
  }
  slot.innerHTML=`<div class="d100-card">
    <div class="d100-hdr"><div class="d100-title">100-Day Build</div><div class="d100-status" id="d100Status" style="cursor:pointer" title="Tap to change start date">Active <button class="d100-edit-btn">✎</button></div></div>
    <div class="d100-big"><span class="d100-day">${dayNum}</span><span class="d100-of">/ 100</span><span class="d100-remain">${100-dayNum} days left</span></div>
    <div class="d100-bar"><div class="d100-fill" style="width:${pct}%"></div></div>
    <div class="d100-meta"><span>Avg <b style="color:${avgCol}">${cnt>0?avg:'—'}</b>${cnt>0?' /100':''} · <b>${strong}</b> strong days</span><span>Ends ${endLbl}</span></div>
    <div class="d100-timeline">${tiles}</div>
  </div>`;
  document.querySelectorAll('.d100-tile[data-td]').forEach(t=>{
    t.addEventListener('click',()=>{hap(8);const[y,mo,d]=t.dataset.td.split('-').map(Number);curDate=new Date(y,mo-1,d);curDate.setHours(0,0,0,0);render()});
  });
  const d100St=document.getElementById('d100Status');
  if(d100St)d100St.addEventListener('click',()=>{
    const cur=localStorage.getItem('eh_100day_start')||'';
    const nv=prompt('100-Day start date (YYYY-MM-DD). Leave blank to reset.',cur);
    if(nv===null)return;
    if(nv.trim()===''){localStorage.removeItem('eh_100day_start');hap(12);render();return}
    if(/^\d{4}-\d{2}-\d{2}$/.test(nv.trim())){localStorage.setItem('eh_100day_start',nv.trim());hap(15);render()}
    else alert('Use YYYY-MM-DD format.');
  });
}

// ===== RUN LOG + MILEAGE =====
function runTargetFor(d){
  // Coach's plan first: exact session for this date
  if(planWeekIdx(d)>=0){
    const p=planSessionFor(d);
    if(!p||p.miles<=0)return null; // rest or XT-only day
    return{miles:p.miles,label:p.label,detail:p.detail,wk:p.wk};
  }
  // Fallback (outside plan window): derived from long-run table
  const dow=d.getDay();
  if(![2,4,6].includes(dow))return null;
  const raceDate=localStorage.getItem('eh_race_date')||'2026-11-14';
  const gd=new Date(raceDate+'T00:00:00');
  const today=new Date(d);today.setHours(0,0,0,0);
  const daysLeft=Math.round((gd-today)/86400000);
  const weeksOut=Math.max(0,Math.floor(daysLeft/7));
  const lrMi=LONG_RUN_PLAN[Math.min(weeksOut,LONG_RUN_PLAN.length-1)]||3;
  if(dow===6)return{miles:lrMi,label:'Long Run'};
  if(dow===2)return{miles:Math.max(2,Math.round(lrMi*0.35*10)/10),label:'Easy Run'};
  if(dow===4)return{miles:Math.max(2,Math.round(lrMi*0.45*10)/10),label:'Mid-Week Run'};
  return null;
}
function renderRunCard(){
  const target=runTargetFor(curDate);if(!target)return'';
  const key=dk(curDate);
  const rd=ld('run_'+key);
  const mi=rd.miles||'',t=rd.timeMin||'';
  let paceTxt='—',paceCls='';
  if(mi>0&&t>0){
    const paceSec=(parseFloat(t)*60)/parseFloat(mi);
    const pMin=Math.floor(paceSec/60),pSec=Math.round(paceSec%60);
    paceTxt=pMin+':'+String(pSec).padStart(2,'0')+'/mi';
    const goalPaceSec=Math.round((parseTimeStr(localStorage.getItem('eh_race_time')||'4:30:00'))/26.2);
    if(paceSec<=goalPaceSec*1.1)paceCls='hit';
    else if(paceSec<=goalPaceSec*1.25)paceCls='slow';
  }
  return `<div class="run-card">
    <div class="run-hdr"><span class="run-title">${target.label}</span><span class="run-target">${target.wk?`Wk ${target.wk}/${MARATHON_PLAN.weeks.length} · `:''}Target: <b>${target.miles}</b>mi</span></div>
    ${target.detail?`<div style="font-size:.68rem;color:var(--text-muted);font-weight:600;margin:-2px 0 8px;line-height:1.4">${target.detail}</div>`:''}
    <div class="run-inputs">
      <div class="run-input-group"><label>Miles</label><input class="run-input" type="number" inputmode="decimal" step="0.1" id="runMiles" value="${mi}" placeholder="${target.miles}"></div>
      <div class="run-input-group"><label>Time (min)</label><input class="run-input" type="number" inputmode="decimal" step="0.1" id="runTime" value="${t}" placeholder="—"></div>
      <div class="run-input-group"><label>Pace</label><div class="run-pace-display ${paceCls}"><b>${paceTxt}</b></div></div>
    </div>
    <textarea class="run-notes" id="runNotes" placeholder="How did it feel? Energy, legs, breathing, terrain...">${(rd.notes||'').replace(/</g,'&lt;')}</textarea>
  </div>`;
}
function parseTimeStr(s){const p=(s||'0:0:0').split(':').map(Number);return(p[0]||0)*3600+(p[1]||0)*60+(p[2]||0)}

// Weekly mileage plan — index = weeks until race
const WEEKLY_MILEAGE_PLAN=[30,20,28,36,44,50,48,46,48,46,44,42,40,38,36,34,32,30,28,26,24,22,20,18,16,14,12,10,8,8];
function weeklyMileageTarget(d){
  const pIdx=planWeekIdx(d);
  if(pIdx>=0)return MARATHON_PLAN.weeks[pIdx].mi;
  const raceDate=localStorage.getItem('eh_race_date')||'2026-11-14';
  const gd=new Date(raceDate+'T00:00:00');
  const td=new Date(d);td.setHours(0,0,0,0);
  const daysLeft=Math.round((gd-td)/86400000);
  const weeksOut=Math.max(0,Math.floor(daysLeft/7));
  return WEEKLY_MILEAGE_PLAN[Math.min(weeksOut,WEEKLY_MILEAGE_PLAN.length-1)]||8;
}

// Weight milestone celebration
const WEIGHT_MILESTONES=[265,260,255,250,245,240,235,230,225,220,215,210];
function celebrateMilestone(m){
  if(navigator.vibrate)try{navigator.vibrate([50,50,100,50,200,50,300])}catch{}
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[523,659,784,1047,1319].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(0,ctx.currentTime+i*.15);g.gain.linearRampToValueAtTime(.3,ctx.currentTime+i*.15+.02);g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*.15+.3);o.start(ctx.currentTime+i*.15);o.stop(ctx.currentTime+i*.15+.35)})}catch{}
  const flash=document.createElement('div');flash.className='pr-flash';document.body.appendChild(flash);
  const toast=document.createElement('div');toast.className='pr-toast';toast.innerHTML=`${m} LBS<small>Milestone Hit</small>`;document.body.appendChild(toast);
  setTimeout(()=>{flash.remove();toast.remove()},2600);
}
function checkWeightMilestone(newW,priorW){
  if(!newW||isNaN(newW)||!priorW||newW>=priorW)return;
  const hit=ld('weight_milestones');let fired=false;
  WEIGHT_MILESTONES.forEach(m=>{if(newW<=m&&priorW>m&&!hit[m]){hit[m]=true;fired=true;setTimeout(()=>celebrateMilestone(m),fired?800:0)}});
  if(fired)sv('weight_milestones',hit);
}

// Training load / readiness
function computeTrainingLoad(){
  const today=new Date();today.setHours(0,0,0,0);
  let runMi=0,liftDays=0,longestRun=0;
  for(let i=1;i<=7;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);const k=dk(d);
    const mi=parseFloat(ld('run_'+k).miles)||0;
    runMi+=mi;if(mi>longestRun)longestRun=mi;
    const wo=ld('wo_'+k);
    if(Object.keys(wo).some(kk=>kk.endsWith('_d')&&wo[kk]))liftDays++;
  }
  // Yesterday recovery check
  const y=new Date(today);y.setDate(y.getDate()-1);
  const yMi=parseFloat(ld('run_'+dk(y)).miles)||0;
  const isLongRunDay=curDate.getDay()===6;
  const slp=ld('slp_'+dk(today));
  const hrs=parseFloat(slp.hours)||0;
  // Decide
  let tag='NORMAL',msg='',cls='normal';
  if(yMi>=12||longestRun>=16){
    tag='EASE';msg=`${longestRun}mi long run in last 7 days + high volume. Easy day — don't compound fatigue.`;cls='ease';
  }else if(runMi>=35||liftDays>=6){
    tag='EASE';msg=`${runMi}mi + ${liftDays} lift days last 7. You're at volume ceiling. Recover today.`;cls='ease';
  }else if(hrs>0&&hrs<6){
    tag='EASE';msg=`Under 6hrs sleep last night. Skip intensity. Do mobility/walking instead.`;cls='ease';
  }else if(isLongRunDay){
    tag='PUSH';msg='Long run day. Fuel up, hit the distance, execute the plan.';cls='push';
  }else if(runMi<10&&liftDays<3){
    tag='PUSH';msg='Low load this week. Ready to go hard today.';cls='push';
  }else{
    tag='NORMAL';msg=`${runMi}mi + ${liftDays} lifts last 7. On track — follow plan.`;cls='normal';
  }
  return {tag,msg,cls};
}

// Compressed 20-week build, started Mon 2026-06-29 (race day fixed Nov 14 = exactly 20 weeks out).
// Keeps: full base ramp, every step-back, the 20-miler, peak week, 3-week taper.
// Trims repeat build weeks from the coach's 30-week original (kept weeks listed below).
const MARATHON_PLAN={start:'2026-06-29',weeks:[1,3,5,6,7,8,9,10,13,14,15,17,19,20,21,23,25,28,29,30].map(n=>MARATHON_WEEKS_FULL[n-1])};
function planWeekIdx(d){
  const s=new Date(MARATHON_PLAN.start+'T00:00:00');
  const t=new Date(d);t.setHours(0,0,0,0);
  const days=Math.round((t-s)/86400000);
  if(days<0)return -1;
  const idx=Math.floor(days/7);
  return idx<MARATHON_PLAN.weeks.length?idx:-1;
}
function planSessionFor(d){
  const idx=planWeekIdx(d);if(idx<0)return null;
  const ses=MARATHON_PLAN.weeks[idx].d[d.getDay()];
  if(!ses)return null;
  return{label:ses[0],miles:ses[1],detail:ses[2]||'',wk:idx+1};
}

// Resting-heart-rate overtraining tripwire (coach's traffic-light system)
// Baseline = avg of prior 7 days with data (needs 3+). +5 bpm = yellow, +7 = red.
function rhrStatus(d){
  const key=dk(d);
  const today=parseInt(ld('rhr_'+key).bpm);
  if(!today)return null;
  const vals=[];
  for(let i=1;i<=7;i++){const pd=new Date(d);pd.setDate(pd.getDate()-i);const v=parseInt(ld('rhr_'+dk(pd)).bpm);if(v)vals.push(v)}
  if(vals.length<3)return{bpm:today,base:null,delta:0,level:0};
  const base=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const delta=today-base;
  return{bpm:today,base,delta,level:delta>=7?2:delta>=5?1:0};
}
function renderRhrBanner(d){
  const r=rhrStatus(d);
  if(!r||!r.level)return'';
  const red=r.level===2;
  return `<div style="background:${red?'#1c0d0d':'#1c160d'};border:1px solid ${red?'#4a1a1a':'#4a3a1a'};border-left:3px solid ${red?'#ef4444':'#f5c842'};border-radius:12px;padding:11px 14px;margin:10px 0">
    <div style="font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:${red?'#ef4444':'#f5c842'};font-weight:800;margin-bottom:4px">${red?'Red flag — resting HR':'Yellow flag — resting HR'}</div>
    <div style="font-size:.72rem;color:var(--text-muted);font-weight:600;line-height:1.5">RHR ${r.bpm} vs ${r.base} baseline (+${r.delta} bpm). ${red?'Coach\'s rule: unplanned rest day. Skip the run, sleep, hydrate. One day now beats a lost week later.':'Coach\'s rule: today goes easy or not at all — no workout, no pace. Recheck tomorrow.'}</div>
  </div>`;
}

// Context-aware DON'T list — the 1-2 rules that matter TODAY, from the coach's plan + history
function dontListFor(d){
  const out=[];
  const idx=planWeekIdx(d);if(idx<0)return out;
  const w=MARATHON_PLAN.weeks[idx],dow=d.getDay(),ses=planSessionFor(d);
  const mo=d.getMonth()+1;
  if(idx===MARATHON_PLAN.weeks.length-1){
    out.push("Nothing new this week. No new shoes, food, or workouts. Feeling flat or puffy = the taper working.");
    if(dow===6)out.push("Don't go out under 10:25 pace. The first 6 miles will feel free. They are not. The race starts at 18.");
    return out.slice(0,2);
  }
  if(w.ph===5)out.push("Don't chase fitness now — it's banked. Cutting volume is the workout.");
  if(w.sb)out.push("Step-back week: don't add miles because you feel good. Adaptation happens during the pull-back, not the push.");
  if(w.ph===1)out.push("No workouts, no pace-chasing. If you can't hold a conversation, slow down — easy is the whole job right now.");
  if(dow===5&&w.d[6]&&w.d[6][1]>=8)out.push("No heavy lower body today — tomorrow's long run pays for every ego set.");
  if(dow===6&&ses&&ses.miles>=14)out.push("Don't run this unfueled — gel at miles 5/10"+(ses.miles>=19?"/15":"")+", with water, race-day brand only.");
  if(mo>=7&&mo<=9&&ses&&ses.miles>0)out.push("Don't chase pace in this heat — 15-30 sec/mi slower at the same effort is correct execution, not weakness.");
  if(ses&&ses.miles>0)out.push("Don't run through a plantar twinge or anything that changes your gait — one easy day now beats three weeks off later.");
  out.push("Don't make up missed miles. The plan survives a missed easy run; stacked catch-up days cause injuries.");
  if(!ses||!ses.miles)out.push("Don't cut calories hard on rest days either — protein stays at target, the deficit comes from snacks and liquid calories.");
  return out.slice(0,2);
}

}

function paceFromGoal(goalStr){
  const p=(goalStr||'4:30:00').split(':').map(Number);
  const totalSec=(p[0]||0)*3600+(p[1]||0)*60+(p[2]||0);
  const perMi=totalSec/26.2;
  const m=Math.floor(perMi/60),s=Math.round(perMi%60);
  return m+':'+String(s).padStart(2,'0');
}
function renderRace(){

  const goalTime=localStorage.getItem('eh_race_time')||'4:30:00';
  const gd=new Date(raceDate+'T00:00:00');
  const today=new Date();today.setHours(0,0,0,0);
  const daysLeft=Math.round((gd-today)/86400000);
  const weeksLeft=(daysLeft/7).toFixed(1);
  const weeksOut=Math.max(0,Math.floor(daysLeft/7));
  const goalW=parseFloat(localStorage.getItem('eh_goal_weight'))||215;
  const startD=localStorage.getItem('eh_start_date')||'2026-04-14';
  const sd=new Date(startD+'T00:00:00');
  const totalDays=Math.max(1,Math.round((gd-sd)/86400000));
  const elapsed=Math.max(0,Math.min(totalDays,totalDays-daysLeft));
  const pct=(elapsed/totalDays)*100;
  if(daysLeft<0){slot.innerHTML='';return}
  const dateLbl=`${MO[gd.getMonth()]} ${gd.getDate()}, ${gd.getFullYear()}`;
  const longRun=LONG_RUN_PLAN[Math.min(weeksOut,LONG_RUN_PLAN.length-1)]||3;
  const pace=paceFromGoal(goalTime);
  const pIdx=planWeekIdx(today);
  let longRunLine;
  if(daysLeft<=7)longRunLine=`<b>RACE WEEK</b> · taper · easy legs only`;
  else if(pIdx>=0){
    const w=MARATHON_PLAN.weeks[pIdx],sat=w.d[6];
    longRunLine=`Week <b>${pIdx+1}/${MARATHON_PLAN.weeks.length}</b> · ${PLAN_PHASES[w.ph]}${w.sb?' · <b style="color:#10b981">step-back week</b>':''} · <b>${w.mi}</b>mi planned<br>Saturday: <b>${sat?sat[1]+'mi '+sat[0]:'rest'}</b> · goal pace ${pace}/mi`;

  const w=getWhy(),empty=!w.trim();

  slot.innerHTML=`<div class="why-card" id="whyCard">

    <div class="why-hint" id="whyHint" style="display:${empty?'block':'none'}">Read this every day. Rewrite when it stops hitting.</div>
  </div>`;
  const card=document.getElementById('whyCard'),ta=document.getElementById('whyEdit'),txt=document.getElementById('whyText'),hint=document.getElementById('whyHint');

}

function needsRecalibrate(){
  const today=new Date();today.setHours(0,0,0,0);
  const done=ld('recal_'+dk(today)).done;if(done)return false;
  const scores=[];
  for(let i=1;i<=7&&scores.length<2;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    if(hasLogged(d))scores.push(scoreDay100(d));
  }
  return scores.length>=2&&scores[0]<60&&scores[1]<60;
}
function renderRecal(){
  const slot=document.getElementById('recalSlot');if(!slot)return;
  if(!needsRecalibrate()){slot.innerHTML='';return}
  const today=new Date();today.setHours(0,0,0,0);const key=dk(today);
  const r=ld('recal_'+key);
  slot.innerHTML=`<div class="recal-card">
    <div class="recal-title">Recalibrate</div>
    <div class="recal-sub">Two days below 60. Don't push through it. Stop. Reset. Write it down before today becomes a third.</div>
    <div class="recal-q"><div class="recal-q-lbl">1. What did I skip or break?</div><textarea id="rq1" placeholder="Be specific. No excuses.">${(r.q1||'').replace(/</g,'&lt;')}</textarea></div>
    <div class="recal-q"><div class="recal-q-lbl">2. What actually caused it? Root, not symptom.</div><textarea id="rq2" placeholder="Tired? Lazy? Emotional? Overwhelmed? Name it.">${(r.q2||'').replace(/</g,'&lt;')}</textarea></div>
    <div class="recal-q"><div class="recal-q-lbl">3. I commit to this today:</div><textarea id="rq3" placeholder="One action. Small. Specific. Done before bed.">${(r.q3||'').replace(/</g,'&lt;')}</textarea></div>
    <button class="recal-btn" id="recalBtn" disabled>Commit & Continue</button>
  </div>`;
  const chk=()=>{const ok=['rq1','rq2','rq3'].every(id=>document.getElementById(id).value.trim().length>2);document.getElementById('recalBtn').disabled=!ok};
  ['rq1','rq2','rq3'].forEach((id,i)=>{const e=document.getElementById(id);e.addEventListener('input',()=>{const r2=ld('recal_'+key);r2['q'+(i+1)]=e.value;sv('recal_'+key,r2);chk()})});

  for(let i=0;i<365;i++){

    const k=dk(d);

    const wo=ld('wo_'+k),hasW=Object.keys(wo).length>0;

  }

}

function sleepWarning(today){
  const yd=new Date(today);yd.setDate(yd.getDate()-1);
  const yHrs=parseFloat(ld('slp_'+dk(yd)).hours)||0;
  let badCount=0,logged=0;
  for(let i=1;i<=7;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const h=parseFloat(ld('slp_'+dk(d)).hours)||0;
    if(h>0){logged++;if(h<7)badCount++}
  }
  const reason=SLEEP_REASONS[Math.floor(Math.random()*SLEEP_REASONS.length)];
  if(yHrs>0&&yHrs<6)return{msg:`Under 6 hours last night. ${reason}`,level:3};
  if(yHrs>0&&yHrs<7)return{msg:`${yHrs}h last night. ${reason}`,level:2};
  if(badCount>=3&&logged>=4)return{msg:`${badCount} of last ${logged} nights under 7 hours. Pattern forming. ${reason}`,level:2};
  return null;
}

function getLastJournalDate(){
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<60;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const jd=ld('j_'+dk(d)+'_daily');
    if(Object.values(jd).some(v=>v&&String(v).trim()))return d;
  }
  return null;
}
function getCallout(){
  const today=new Date();today.setHours(0,0,0,0);
  const dismissKey='eh_callout_dismiss_'+dk(today);
  if(localStorage.getItem(dismissKey))return null;
  const last=getLastActivityDate();
  if(!last)return{title:'DAY ONE',msg:'No data logged yet. Stop planning. Start logging. One check-in changes everything.',level:1};
  const gap=Math.round((today-last)/86400000);
  if(gap>=8)return{title:'MIA',msg:gap+' days unlogged. The streak is dead. Stop hiding. Pick today and rebuild — one box at a time.',level:3};
  if(gap>=4)return{title:'GHOSTED',msg:gap+' days without a single check-in. This is how discipline dies — quietly. Log today or stop calling yourself elite.',level:3};
  if(gap>=2)return{title:'SLIPPING',msg:gap+" days off the grid. One more skip and it's a habit you broke. Fix it now.",level:2};
  if(gap===1)return{title:'YOU SKIPPED YESTERDAY',msg:"Zero entries for yesterday. That day is 0/11 forever. Don't let today become another zero.",level:2};
  // Sleep pattern warning
  const sw=sleepWarning(today);
  if(sw)return{title:'SLEEP SLIPPING',msg:sw.msg,level:sw.level};
  // Sunday Review reminder
  if(today.getDay()===0){
    const jWk=ld('j_'+dk(today)+'_weekly');
    const hasWeekly=Object.values(jWk).some(v=>v&&String(v).trim());
    if(!hasWeekly){
      return{title:'SUNDAY REVIEW',msg:"End of the week. Open Journal → Sun Review. Stats, wins, misses, next week's Top 3 — 5 minutes. Turns data into insight.",level:1};
    }
  }
  const hour=new Date().getHours();
  const todayData=ld('sc_'+dk(today));
  const todayCount=Object.values(todayData).filter(v=>v===true).length;
  const hLbl=hour>=12?((hour-12)||12)+'pm':hour+'am';
  // Weight log overdue
  const lastW=getLastWeightDate();
  if(!lastW){
    return{title:'WEIGH-IN MISSING',msg:"No weight logged yet. Morning fasted weight — 30 seconds. The scale doesn't lie; you need that data to see the trend.",level:2};
  }else{
    const wGap=Math.round((today-lastW)/86400000);
    if(wGap>=7)return{title:'WEIGH-IN OVERDUE',msg:wGap+` days since your last weigh-in. Fasted AM weight is the fastest honesty check you have. Log it now.`,level:2};
  }
  // Nutrition empty
  if(hour>=14){
    const nut=ld('nut_'+dk(today));
    if(!nut.meals||!nut.meals.length){
      return{title:'NUTRITION BLANK',msg:"It's past "+hLbl+" and zero meals logged today. Log what you ate — guesses aren't a plan. Nutrition tab, tap a preset.",level:2};
    }
  }
  // Journal silent
  const lastJ=getLastJournalDate();
  if(lastJ){
    const jGap=Math.round((today-lastJ)/86400000);
    if(jGap>=5)return{title:'JOURNAL SILENT',msg:jGap+" days without writing anything down. Data without reflection is just numbers. Sit down tonight — even one line.",level:1};
  }else if(gap>=3){
    return{title:'JOURNAL SILENT',msg:"No journal entry yet. The scorecard tracks what you did — the journal tracks why. Both matter.",level:1};
  }
  if(gap===0&&todayCount===0&&hour>=14){
    return{title:'CLOCK CHECK',msg:"It's past "+hLbl+" and zero boxes are checked today. Where's the proof? Log what you've actually done.",level:2};
  }
  // Daytime Debt — 3pm+, nothing meaningful done yet → you're about to negotiate with sleep
  if(gap===0&&hour>=15){
    const pri=ld('pri_'+dk(today));
    const priDone=[1,2,3].filter(n=>pri['d'+n]&&pri['p'+n]&&String(pri['p'+n]).trim()).length;
    if(priDone===0&&todayCount<3){
      const DAY_DEBT_MSGS=[
        "You're negotiating with tonight's sleep right now. Do the work before dark.",
        "Every hour delayed now is bought back at 11pm — with interest.",
        "The catch-up tax is paid in sleep. Pay it now in effort instead.",
        "This is the moment the day tips. Win it or pay tonight.",
        "Procrastination now = bedtime broken. Break the pattern here, before dinner.",
        "Tonight's bad sleep started at 3pm when you didn't move. Move now."
      ];
      return{title:'DAYTIME DEBT',msg:DAY_DEBT_MSGS[Math.floor(Math.random()*DAY_DEBT_MSGS.length)],level:2};
    }
  }
  if(gap===0&&hour>=19){
    const tmr=new Date(today);tmr.setDate(tmr.getDate()+1);
    const tmrPri=ld('pri_'+dk(tmr));
    const hasTmrPri=[1,2,3].some(n=>tmrPri['p'+n]&&String(tmrPri['p'+n]).trim());
    if(!hasTmrPri){
      return{title:"TOMORROW'S THREE",msg:"Past 7pm. Tomorrow's Top 3 are blank. Set intention before sleep — tap the date arrow to tomorrow and fill them in.",level:1};
    }
  }
  if(gap===0&&todayCount<3&&hour>=20){
    return{title:'LAST CALL',msg:"Day's almost done. Only "+todayCount+" logged. Close the books honestly before bed.",level:1};
  }
  return null;
}

function computeRollup(){
  const today=new Date();today.setHours(0,0,0,0);
  const days=[];
  for(let i=29;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    if(hasLogged(d))days.push({d:new Date(d),score:scoreDay100(d),brk:scoreBreakdown(d)});
  }
  if(!days.length)return null;
  const avg=Math.round(days.reduce((s,x)=>s+x.score,0)/days.length);
  const alignment=Math.round(days.filter(x=>x.score>=90).length/days.length*100);
  const consistency=Math.round(days.filter(x=>x.score>=80).length/days.length*100);
  const weeks=[[],[],[],[]];
  days.forEach(x=>{
    const daysAgo=Math.floor((today-x.d)/86400000);
    const wk=Math.min(3,Math.floor(daysAgo/7));
    weeks[wk].push(x.score);
  });
  const weekAvgs=weeks.map(w=>w.length?Math.round(w.reduce((s,x)=>s+x,0)/w.length):0).reverse();
  const sorted=[...days].sort((a,b)=>b.score-a.score);
  const best=sorted[0],worst=sorted[sorted.length-1];
  const catSums={},catCounts={};
  days.forEach(x=>{Object.keys(x.brk).forEach(k=>{const c=x.brk[k],pct=c.max>0?(c.earned/c.max)*100:0;catSums[k]=(catSums[k]||0)+pct;catCounts[k]=(catCounts[k]||0)+1})});
  const catAvgs=Object.keys(catSums).map(k=>({k,pct:catSums[k]/catCounts[k]})).sort((a,b)=>b.pct-a.pct);
  const strongest=catAvgs[0],weakest=catAvgs[catAvgs.length-1];
  const trend=weekAvgs[3]-weekAvgs[0];
  // Momentum (this 7d avg - prior 7d avg)
  const tW=[],lW=[];
  for(let i=0;i<7;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(hasLogged(d))tW.push(scoreDay100(d))}
  for(let i=7;i<14;i++){const d=new Date(today);d.setDate(d.getDate()-i);if(hasLogged(d))lW.push(scoreDay100(d))}
  const momentum=(tW.length&&lW.length)?Math.round((tW.reduce((s,x)=>s+x,0)/tW.length)-(lW.reduce((s,x)=>s+x,0)/lW.length)):null;
  // Bounce-Back: avg score the day after any sub-60 day
  let bbSum=0,bbCnt=0;
  const sortedByDate=[...days].sort((a,b)=>a.d-b.d);
  sortedByDate.forEach((x,i)=>{if(x.score<60&&i<sortedByDate.length-1){bbSum+=sortedByDate[i+1].score;bbCnt++}});
  const bounceBack=bbCnt>0?Math.round(bbSum/bbCnt):null;
  return {avg,alignment,consistency,weekAvgs,best,worst,strongest,weakest,trend,momentum,bounceBack,bbCnt,dayCount:days.length};
}

function detectWeaknesses(){
  const today=new Date();today.setHours(0,0,0,0);
  const flags=[];
  const habits=[
    {id:'fasted',label:'fasted cardio'},
    {id:'lift',label:'lifting'},
    {id:'post_cardio',label:'post-workout cardio'},
    {id:'nosnack',label:'clean eating (snacking)'},
    {id:'journal',label:'journaling'}
  ];
  const dowName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  habits.forEach(h=>{
    for(let dow=0;dow<7;dow++){
      let miss=0,logged=0;
      for(let w=0;w<4;w++){
        const offset=((today.getDay()-dow+7)%7)+w*7;
        if(offset===0&&w===0)continue;
        const d=new Date(today);d.setDate(d.getDate()-offset);
        if(!hasLogged(d))continue;
        logged++;
        const data=ld('sc_'+dk(d));
        if(data[h.id]!==true)miss++;
      }
      if(miss>=3&&logged>=3&&flags.length<3)flags.push(`Missed ${h.label} ${miss} of last ${logged} ${dowName[dow]}s.`);
    }
  });
  if(flags.length<3){
    const days=[];
    for(let i=13;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);if(hasLogged(d))days.push(d)}
    if(days.length>=5){
      const catSums={},catCounts={};
      days.forEach(d=>{const b=scoreBreakdown(d);Object.keys(b).forEach(k=>{catSums[k]=(catSums[k]||0)+(b[k].max>0?(b[k].earned/b[k].max)*100:0);catCounts[k]=(catCounts[k]||0)+1})});
      Object.keys(catSums).forEach(k=>{const pct=catSums[k]/catCounts[k];if(pct<50&&flags.length<3)flags.push(`${CAT_LABELS[k]} is averaging ${Math.round(pct)}% over 14 days.`)});
    }
  }
  if(flags.length<3){
    TOX_ITEMS.forEach(t=>{
      if(flags.length>=3)return;
      let cnt=0;
      for(let i=0;i<14;i++){const d=new Date(today);d.setDate(d.getDate()-i);const tox=ld('tox_'+dk(d));if(t.tiers){if(parseInt(tox[t.id])>0)cnt++}else if(tox[t.id])cnt++}
      if(cnt>=3)flags.push(`${t.label}: ${cnt}× in 14 days.`);
    });
  }
  return flags;
}
function renderWeakness(){
  const slot=document.getElementById('weakSlot');if(!slot)return;

  if(!flags.length){slot.innerHTML='';return}

}

function selfTrustIndex(){
  const today=new Date();today.setHours(0,0,0,0);
  let total=0,kept=0;
  for(let i=0;i<30;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const kw=ld('kw_'+dk(d));
    if(kw.value){total++;if(kw.value==='yes')kept++}
  }
  return total>0?Math.round((kept/total)*100):0;
}

  {id:'junk',label:'Fast food / Junk',tiers:[1,2,3],tierPts:[-5,-10,-15]},
  {id:'nic',label:'Nicotine / Vape',pts:-10},
  {id:'sugar',label:'Sugar binge',pts:-5},
  {id:'doom',label:'Doom scroll 1hr+',pts:-3}
];

function scoreBreakdown(d){
  const key=dk(d),data=ld('sc_'+key),items=getActive(d);
  const active=id=>items.find(i=>i.id===id)?.active;
  const on=id=>data[id]===true;
  const out={};
  // Sleep (15): bedtime (+5), hours tiered (up to +10, can be -3 if <6)
  const slp=ld('slp_'+key);
  const hrs=parseFloat(slp.hours)||0;
  const bedOk=slp.bedtime&&slp.bedtime<='23:00'&&slp.bedtime>='12:00';
  let hrsPts=0;
  if(hrs>=8)hrsPts=10;
  else if(hrs>=7.5)hrsPts=8.5;
  else if(hrs>=7)hrsPts=7;
  else if(hrs>=6)hrsPts=3;
  else if(hrs>0)hrsPts=-3;
  const bedPts=bedOk?5:0;
  out.sleep={earned:hrsPts+bedPts,max:WEIGHTS.sleep};
  // Workout: fasted AM cardio + lift + post-workout cardio daily, + run on run days
  const runAct=active('run');
  const parts=(on('fasted')?1:0)+(on('lift')?1:0)+(on('post_cardio')?1:0)+(runAct?(on('run')?1:0):0);
  const mx=3+(runAct?1:0);
  out.workout={earned:WEIGHTS.workout*(parts/mx),max:WEIGHTS.workout};
  // Nutrition: 3 sub-metrics (cal, pro, no-snack). Protein tiered. Uses meal totals if logged.
  const nut=ld('nut_'+key);
  let calHit,proHit;
  if(nut.meals&&nut.meals.length){
    const tg=getNutTarget();
    const tot=nutTotals(nut);
    calHit=Math.abs(tot.cal-tg.cal)<=100?1:0;
    proHit=tot.pro>=220?1:tot.pro>=165?0.7:tot.pro>=130?0.4:0;
  }else{
    calHit=on('calories')?1:0;
    const proTier=parseInt(data.protein)||0;
    proHit=proTier>=220?1:proTier>=165?0.7:proTier>=130?0.4:0;
  }
  const snackHit=on('nosnack')?1:0;
  const nHitSum=calHit+proHit+snackHit;
  out.nutrition={earned:WEIGHTS.nutrition*(nHitSum/3),max:WEIGHTS.nutrition};
  // Hydration (5): tiered. <6 pills (<144oz) = fail (0). 6=3, 7=4, 8=5 (goal 192oz).
  const wCnt=parseInt(data.water)||0;
  let hydPts=0;
  if(wCnt>=8)hydPts=5;
  else if(wCnt>=7)hydPts=4;
  else if(wCnt>=6)hydPts=3;
  out.hydration={earned:hydPts,max:WEIGHTS.hydration};
  // Execution (10): wake on time (+5) + steps tier (fail -2, 8K=3, 10K=4, 12K=5)
  const stepVal=parseInt(data.steps);
  let stepPts=0;
  if(stepVal===-1)stepPts=-2; // explicit fail
  else if(stepVal>=12)stepPts=5;
  else if(stepVal>=10)stepPts=4;
  else if(stepVal>=8)stepPts=3;
  out.execution={earned:(wakeHit(d)?5:0)+stepPts,max:WEIGHTS.execution};
  // Priorities
  const pri=ld('pri_'+key);
  const pDone=[1,2,3].filter(n=>pri['d'+n]&&pri['p'+n]&&pri['p'+n].trim()).length;
  out.priorities={earned:WEIGHTS.priorities*(pDone/3),max:WEIGHTS.priorities};
  // Kept My Word
  const kw=ld('kw_'+key);
  out.keptWord={earned:kw.value==='yes'?WEIGHTS.keptWord:0,max:WEIGHTS.keptWord};
  // Review
  out.review={earned:on('journal')?WEIGHTS.review:0,max:WEIGHTS.review};
  return out;
}
function isSpecialEventDay(d){return localStorage.getItem('eh_se_'+dk(d))==='1'}
function toxicPenalty(d){
  const tox=ld('tox_'+dk(d));let p=0;
  const isSE=isSpecialEventDay(d);
  TOX_ITEMS.forEach(t=>{
    if(isSE&&t.id==='alc')return; // alcohol waived on special event days
    if(t.tiers){
      const v=parseInt(tox[t.id])||0;
      if(v>0){
        const idx=Math.min(v-1,t.tiers.length-1);
        p+=t.tierPts[idx];
      }
    }else if(tox[t.id])p+=t.pts;
  });
  return p;
}
function countSpecialEventsThisMonth(d){
  const today=new Date(d);today.setHours(0,0,0,0);
  const monthStart=new Date(today.getFullYear(),today.getMonth(),1);
  let used=0;
  for(let iter=new Date(monthStart);iter<=today;iter.setDate(iter.getDate()+1)){
    if(localStorage.getItem('eh_se_'+dk(iter))==='1')used++;
  }
  return used;
}
function scoreDay100(d){
  let s=0;Object.values(scoreBreakdown(d)).forEach(c=>s+=c.earned);
  s+=toxicPenalty(d);
  return Math.max(0,Math.min(100,Math.round(s)));
}
function zone100(s){
  if(s>=90)return{label:'ELITE',color:'#f5c842',glow:true};
  if(s>=80)return{label:'STRONG',color:'#10b981',glow:false};
  if(s>=70)return{label:'DRIFTING',color:'#f59e0b',glow:false};
  if(s>=60)return{label:'SLIPPING',color:'#ff6b35',glow:false};
  return{label:'OFF TRACK',color:'#ef4444',glow:false};
}
function hasLogged(d){const k=dk(d);return Object.values(ld('sc_'+k)).some(v=>v===true)||Object.keys(ld('pri_'+k)).length>0||(ld('kw_'+k).value)}

function getActive(d){
  const dow=d.getDay();
  return getSCItems().map(i=>{
    let a=true;
    if(i.liftDays)a=i.liftDays.includes(dow);
    if(i.cornellDays)a=i.cornellDays.includes(dow);
    if(i.runDays){
      if(planWeekIdx(d)>=0){const ps=planSessionFor(d);a=!!(ps&&ps.miles>0)}
      else a=i.runDays.includes(dow);
    }
    if(i.days&&Array.isArray(i.days))a=i.days.includes(dow);
    let detail=i.detail;
    if(i.weeklyTarget){
      const wkStart=new Date(d);wkStart.setHours(0,0,0,0);wkStart.setDate(wkStart.getDate()-wkStart.getDay());
      let cnt=0;
      for(let k=0;k<=dow;k++){
        const wd=new Date(wkStart);wd.setDate(wd.getDate()+k);
        if(ld('sc_'+dk(wd))[i.id]===true)cnt++;
      }
      const hit=cnt>=i.weeklyTarget;
      detail=`${cnt}/${i.weeklyTarget} this wk${hit?' ✓':''}`;
    }
    return{...i,detail,active:a};
  });
}
function wakeTarget(d){const dow=d.getDay();return dow===0?'08:00':dow===6?'07:00':'06:15'}
function wakeHit(d){const slp=ld('slp_'+dk(d));return slp.wake&&slp.wake<=wakeTarget(d)}
function getMax(d){return getActive(d).filter(i=>i.active).length}
function getDayScore(d){const data=ld('sc_'+dk(d)),items=getActive(d);let s=0;items.forEach(i=>{if(i.active&&data[i.id])s++});return s}
function scCol(s,m){const p=m>0?s/m:0;return p>=9/11?'#4CAF50':p>=7/11?'#f5c842':'#ff4444'}
function scTxt(s,m){const p=m>0?s/m:0;if(p>=10/11)return'ELITE';if(p>=9/11)return'ON TARGET';if(p>=7/11)return'CLOSE';return s===0?'-':'PUSH HARDER'}

function fmtTime12(t){if(!t||!/^\d{2}:\d{2}$/.test(t))return t;const[h,m]=t.split(':').map(Number);const ap=h>=12?'pm':'am';const h12=h%12||12;return h12+':'+String(m).padStart(2,'0')+ap}

// ===== NUTRITION =====
function getNutTarget(){try{const t=JSON.parse(localStorage.getItem('eh_nut_target'));if(t)return{cal:2400,pro:220,carbs:260,fat:70,...t}}catch{}return{cal:2400,pro:220,carbs:260,fat:70}}
function setNutTarget(t){localStorage.setItem('eh_nut_target',JSON.stringify(t))}
function getNutPresets(){try{return JSON.parse(localStorage.getItem('eh_nut_presets'))||[]}catch{return[]}}
function setNutPresets(p){localStorage.setItem('eh_nut_presets',JSON.stringify(p))}
function nutTotals(d){const t={cal:0,pro:0,carbs:0,fat:0};(d.meals||[]).forEach(m=>{t.cal+=+m.cal||0;t.pro+=+m.pro||0;t.carbs+=+m.carbs||0;t.fat+=+m.fat||0});return t}
function calcNutScore(key){
  const d=ld('nut_'+key),t=nutTotals(d),tg=getNutTarget();let s=0;
  if(d.meals&&d.meals.length){
    const cDiff=Math.abs(t.cal-tg.cal);
    if(cDiff<=100)s+=35;else if(cDiff<=200)s+=22;else if(cDiff<=300)s+=10;
    if(t.pro>=tg.pro)s+=30;else if(t.pro>=tg.pro*.9)s+=22;else if(t.pro>=tg.pro*.75)s+=12;
  }
  const sc=ld('sc_'+key),wCnt=parseInt(sc.water)||0;
  if(wCnt>=8)s+=15;else if(wCnt>=6)s+=10;else if(wCnt>=4)s+=5;
  const mc=(d.meals||[]).length;
  if(mc>=3)s+=10;else if(mc>=2)s+=5;
  const tox=ld('tox_'+key);
  if(!tox.sugar&&!tox.junk)s+=10;
  return Math.max(0,Math.min(100,Math.round(s)));
}

function getIFState(){try{return JSON.parse(localStorage.getItem('eh_if_state'))||{target:16}}catch{return{target:16}}}
function saveIFState(s){localStorage.setItem('eh_if_state',JSON.stringify(s))}
function ifStreak(){
  const today=new Date();today.setHours(0,0,0,0);
  let s=0;
  for(let i=1;i<365;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ifd=ld('if_'+dk(d));
    if(ifd.hit)s++;else break;
  }
  return s;
}
function renderIFCard(){
  const st=getIFState(),target=st.target||16;
  let body='';
  if(st.startedAt){
    const el=(Date.now()-st.startedAt)/3600000;
    const hit=el>=target,pct=Math.min(100,(el/target)*100);
    const col=hit?'#10b981':'#f5c842';
    const hrs=Math.floor(el),mins=Math.floor((el-hrs)*60);
    body=`<div class="if-time"><span class="if-num" style="color:${col}">${hrs}:${String(mins).padStart(2,'0')}</span><span class="if-unit">fasting</span><span class="if-status ${hit?'hit':'fasting'}">${hit?'Target Hit':'Fasting'}</span></div>
      <div class="if-bar"><div class="if-fill" style="width:${pct}%;background:${col}"></div></div>`;
  }else{
    body=`<div class="if-time"><span class="if-num" style="color:var(--text-faint)">—</span><span class="if-unit">fed window</span><span class="if-status fed">Not fasting</span></div>
      <div class="if-bar"></div>`;
  }
  body+='<div class="if-targets">'+[16,18,20].map(t=>`<button class="if-target${target===t?' on':''}" data-if-target="${t}">${t}h</button>`).join('')+'</div>';
  body+=st.startedAt?`<button class="if-btn break" id="ifBtn">Break Fast</button>`:`<button class="if-btn" id="ifBtn">Start Fast Now</button>`;
  const streak=ifStreak();
  return `<div class="if-card"><div class="if-hdr"><span class="if-title">Fasting</span><span class="if-streak">Streak <b>${streak}</b>d</span></div>${body}</div>`;
}

function renderCalDistribution(){
  const today=new Date();today.setHours(0,0,0,0);
  const buckets=[
    {label:'< 1,800',min:0,max:1799,col:'#ef4444',tag:'under'},
    {label:'1,800 – 2,200',min:1800,max:2199,col:'#ff6b35',tag:'off-day'},
    {label:'2,200 – 2,600',min:2200,max:2599,col:'#10b981',tag:'training day'},
    {label:'2,600 – 3,200',min:2600,max:3199,col:'#f5c842',tag:'long run day'},
    {label:'3,200+',min:3200,max:99999,col:'#8b5cf6',tag:'over'}
  ].map(b=>({...b,count:0}));
  let logged=0;
  for(let i=0;i<30;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const dn=ld('nut_'+dk(d));
    if(!dn.meals||!dn.meals.length)continue;
    const cal=nutTotals(dn).cal;
    logged++;
    const bk=buckets.find(b=>cal>=b.min&&cal<=b.max);
    if(bk)bk.count++;
  }
  if(!logged)return '';
  const maxC=Math.max(...buckets.map(b=>b.count),1);
  let h=`<div class="cal-dist-card">
    <div class="cal-dist-hdr"><span class="cal-dist-lbl">30-Day Calorie Distribution</span><span class="cal-dist-days">${logged}d logged</span></div>`;
  buckets.forEach(b=>{
    const pct=b.count/maxC*100;
    h+=`<div class="cal-dist-row"><span class="cal-dist-range">${b.label}</span><div class="cal-dist-bar"><div class="cal-dist-fill" style="width:${Math.max(pct,b.count>0?4:0)}%;background:${b.col}"></div></div><span class="cal-dist-count">${b.count}d</span></div>`;
  });
  h+=`</div>`;
  return h;
}

function renderWeeklyMacro(){
  const today=new Date();today.setHours(0,0,0,0);
  let calSum=0,proSum=0,calHit=0,proHit=0,days=0;
  const tg=getNutTarget();
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const dn=ld('nut_'+dk(d));
    if(!dn.meals||!dn.meals.length)continue;
    const t=nutTotals(dn);
    calSum+=t.cal;proSum+=t.pro;
    if(Math.abs(t.cal-tg.cal)<=100)calHit++;
    if(t.pro>=tg.pro*.95)proHit++;
    days++;
  }
  if(!days)return '';
  const calAvg=Math.round(calSum/days),proAvg=Math.round(proSum/days);
  return `<div class="nut-weekly">
    <div class="nut-weekly-hdr"><span class="nut-weekly-lbl">Last 7 Days</span><span class="nut-weekly-days">${days}d logged</span></div>
    <div class="nut-weekly-row"><span class="nut-weekly-row-lbl">Cal Avg</span><span class="nut-weekly-row-val"><b>${calAvg}</b><small class="${calHit>=days*.7?'hit':''}">target ${calHit}/${days}d</small></span></div>
    <div class="nut-weekly-row"><span class="nut-weekly-row-lbl">Pro Avg</span><span class="nut-weekly-row-val"><b>${proAvg}g</b><small class="${proHit>=days*.7?'hit':''}">target ${proHit}/${days}d</small></span></div>
  </div>`;
}

function celebratePR(deltaTxt,exerciseName){
  if(navigator.vibrate)try{navigator.vibrate([40,40,80,40,120,40,200])}catch{}
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[523,659,784,1047].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(0,ctx.currentTime+i*.1);g.gain.linearRampToValueAtTime(.25,ctx.currentTime+i*.1+.02);g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*.1+.25);o.start(ctx.currentTime+i*.1);o.stop(ctx.currentTime+i*.1+.3)})}catch{}
  const flash=document.createElement('div');flash.className='pr-flash';document.body.appendChild(flash);
  const toast=document.createElement('div');toast.className='pr-toast';toast.innerHTML=`PR · +${deltaTxt}<small>${exerciseName||''}</small>`;document.body.appendChild(toast);
  setTimeout(()=>{flash.remove();toast.remove()},1900);
}

function renderWeightSection(){
  const today=new Date();today.setHours(0,0,0,0);
  const pts=[];
  for(let i=89;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const w=parseFloat(ld('wt_'+dk(d)).lbs);
    if(w)pts.push({d:new Date(d),w,idx:i});
  }
  if(!pts.length)return `<div class="wt-card"><div class="wt-hdr"><span class="nut-score-lbl">Weight</span></div><div class="wt-empty">No weight logged. Tap Sleep/Weight on the Today tab to log fasted AM weight.</div></div>`;
  const cur=pts[pts.length-1].w;
  const avg=(n)=>{const last=pts.slice(-n);return last.length?last.reduce((s,p)=>s+p.w,0)/last.length:0};
  const a7=avg(7),a30=avg(30);
  // Delta vs 7 days ago
  const ago7=pts.find(p=>{const diff=Math.round((today-p.d)/86400000);return diff>=6&&diff<=8});
  const d7=ago7?(cur-ago7.w):null;
  const dCls=d7==null?'flat':d7>0?'up':d7<0?'down':'flat';
  const dTxt=d7==null?'—':(d7>0?'+':'')+d7.toFixed(1);
  // Chart: last 30 days
  const chartPts=pts.slice(-30);
  const W=280,H=72;
  let chart='';
  if(chartPts.length>1){
    const vals=chartPts.map(p=>p.w),mn=Math.min(...vals)-0.3,mx=Math.max(...vals)+0.3,rng=mx-mn||1;
    const stepX=W/(chartPts.length-1);
    let path='',dots='';
    chartPts.forEach((p,i)=>{
      const x=i*stepX,y=H-((p.w-mn)/rng)*H;
      path+=(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1)+' ';
      dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${i===chartPts.length-1?3:2}" fill="${i===chartPts.length-1?'#f5c842':'#7c8cf5'}"/>`;
    });
    chart=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none"><path d="${path}" fill="none" stroke="#7c8cf5" stroke-width="1.5" stroke-linecap="round"/>${dots}</svg>`;
  }else{
    chart=`<div class="wt-empty" style="padding:8px">Need 2+ entries to draw a trend.</div>`;
  }
  // Goal weight + deadline
  const goal=parseFloat(localStorage.getItem('eh_goal_weight'));
  const goalDate=localStorage.getItem('eh_goal_date')||'';
  let goalRow='';
  if(window._goalEdit){
    goalRow=`<div class="wt-goal-edit">
      <div><label>Goal (lbs)</label><input class="wt-goal-input" id="goalInput" type="number" step="0.1" value="${goal||''}" placeholder="215"></div>
      <div><label>Target Date</label><input class="wt-goal-input" id="goalDateInput" type="date" value="${goalDate||'2026-11-14'}"></div>
      <button id="goalSave">Save</button>
    </div>`;
  }else if(goal){
    const diff=cur-goal,awayTxt=Math.abs(diff).toFixed(1);
    let paceLine='';
    if(goalDate){
      const gd=new Date(goalDate+'T00:00:00');
      const today=new Date();today.setHours(0,0,0,0);
      const daysLeft=Math.round((gd-today)/86400000);
      if(daysLeft>0){
        const weeksLeft=daysLeft/7;
        const paceNeeded=(diff/weeksLeft);
        const paceCol=paceNeeded>2.5?'#ef4444':paceNeeded>1.5?'#f5c842':'#10b981';
        paceLine=`<div class="wt-goal-pace"><b>${daysLeft}</b>days to ${MO[gd.getMonth()]} ${gd.getDate()} · <b style="color:${paceCol}">${paceNeeded.toFixed(1)}</b>lb/wk needed</div>`;
      }else if(daysLeft===0){paceLine=`<div class="wt-goal-pace"><b style="color:#f5c842">Today is the deadline.</b></div>`}
      else{paceLine=`<div class="wt-goal-pace">Deadline passed · set a new one</div>`}
    }
    goalRow=`<div class="wt-goal-row"><div>Goal <b>${goal}</b>lb · <b>${awayTxt}</b>lb ${diff>0?'to lose':diff<0?'to gain':'reached'}${paceLine}</div><button class="wt-goal-btn" id="goalEdit">Edit</button></div>`;
  }else{
    goalRow=`<div class="wt-goal-row"><div>Set a target weight + date to track pace</div><button class="wt-goal-btn" id="goalEdit">Set Goal</button></div>`;
  }
  return `<div class="wt-card">
    <div class="wt-hdr">
      <div class="wt-curr"><span class="wt-curr-num">${cur.toFixed(1)}</span><span class="wt-curr-unit">lbs</span><span class="wt-delta ${dCls}">${dTxt}${d7!=null?' 7d':''}</span></div>
      <div class="wt-stats"><span>7d<b>${a7.toFixed(1)}</b></span><span>30d<b>${a30.toFixed(1)}</b></span></div>
    </div>
    <div class="wt-chart">${chart}</div>
    ${goalRow}
  </div>`;
}

function renderNutrition(){
  const key=dk(curDate);
  const d=ld('nut_'+key);if(!d.meals)d.meals=[];
  const target=getNutTarget();
  const t=nutTotals(d);
  const presets=getNutPresets();
  // Calorie ring
  const calPct=Math.min(100,(t.cal/target.cal)*100);
  const calRemain=target.cal-t.cal;
  const circ=2*Math.PI*54;
  let col='#10b981';
  if(t.cal>target.cal*1.1)col='#ef4444';
  else if(t.cal>target.cal)col='#f5c842';
  else if(t.cal<target.cal*.5)col='#666';
  let h=`<div class="nut-ring"><svg width="150" height="150" viewBox="0 0 120 120"><circle cx="60" cy="60" r="54" fill="none" stroke="#1a1a24" stroke-width="8"/><circle cx="60" cy="60" r="54" fill="none" stroke="${col}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ-(calPct/100)*circ}"/></svg>
    <div class="nut-display"><div class="nut-cal" style="color:${col}">${Math.round(t.cal)}</div><div class="nut-target-line">/ ${target.cal} cal</div></div></div>
    <div class="nut-remaining${calRemain<0?' over':''}"><b>${calRemain<0?'OVER '+Math.abs(Math.round(calRemain)):Math.round(calRemain)}</b> ${calRemain<0?'cal':'cal left'}</div>`;
  // Macros
  h+=`<div class="nut-macros">`;
  [['Protein','pro',target.pro,'#3b82f6'],['Carbs','carbs',target.carbs,'#f5c842'],['Fat','fat',target.fat,'#ff6b35']].forEach(([lbl,k,tg,base])=>{
    const v=t[k],pct=Math.min(100,(v/tg)*100);
    let mc=base;if(v>tg*1.15)mc='#ef4444';else if(v>=tg*.95)mc='#10b981';
    h+=`<div class="nut-mac-row"><span class="nut-mac-lbl">${lbl}</span><div class="nut-mac-bar"><div class="nut-mac-fill" style="width:${pct}%;background:${mc}"></div></div><span class="nut-mac-vals"><b>${Math.round(v)}</b> / ${tg}g</span></div>`;
  });
  h+=`</div>`;
  // Intermittent fasting
  h+=renderIFCard();

  h+=renderCaffeineCard();
  // Weekly macro trend
  h+=renderWeeklyMacro();
  // 30-day calorie distribution

  // Today's plan

  const nsCol=ns>=90?'#f5c842':ns>=80?'#10b981':ns>=70?'#f59e0b':ns>=60?'#ff6b35':'#ef4444';

function renderFormsDiscipline(){
  const today=new Date();today.setHours(0,0,0,0);
  const c={scorecard:0,nutrition:0,weight:0,journal:0,priorities:0,keptWord:0,supps:0};
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);const k=dk(d);
    const sc=ld('sc_'+k);
    if(Object.values(sc).filter(v=>v===true).length>=3)c.scorecard++;
    const nut=ld('nut_'+k);
    if(nut.meals&&nut.meals.length>0)c.nutrition++;
    if(parseFloat(ld('wt_'+k).lbs))c.weight++;
    const jd=ld('j_'+k+'_daily');
    if(Object.values(jd).some(v=>v&&String(v).trim()))c.journal++;
    const pri=ld('pri_'+k);
    if([1,2,3].some(n=>pri['p'+n]&&String(pri['p'+n]).trim()))c.priorities++;
    if(ld('kw_'+k).value)c.keptWord++;
    const sup=ld('sup_'+k);
    if(Object.values(sup).some(v=>v===true))c.supps++;
  }
  const rows=[
    {key:'scorecard',label:'Scorecard'},
    {key:'nutrition',label:'Nutrition'},
    {key:'weight',label:'Weight'},
    {key:'priorities',label:'Top 3'},
    {key:'keptWord',label:'Kept Word'},
    {key:'supps',label:'Supps'},
    {key:'journal',label:'Journal'}
  ];
  const totalHit=Object.values(c).reduce((s,x)=>s+x,0);
  const totalPossible=rows.length*7;
  const overallPct=Math.round((totalHit/totalPossible)*100);
  let h=`<div class="forms-card"><div class="forms-hdr"><span>7-Day Log Discipline</span><small>${overallPct}% overall</small></div>`;
  rows.forEach(r=>{
    const v=c[r.key],pct=(v/7)*100;
    const col=v>=6?'#10b981':v>=4?'#f5c842':v>=2?'#ff6b35':'#ef4444';
    h+=`<div class="forms-row"><span class="forms-name">${r.label}</span><div class="forms-bar"><div class="forms-fill" style="width:${Math.max(pct,v>0?4:0)}%;background:${col}"></div></div><span class="forms-count" style="color:${col}">${v}/7</span></div>`;
  });
  h+=`</div>`;
  return h;
}

function renderHeatRows(){
  const habits=[
    {label:'Sleep 7+',fn:(data,d,k)=>{const s=ld('slp_'+k);return(parseFloat(s.hours)||0)>=7}},
    {label:'Bed by 11',fn:(data,d,k)=>{const s=ld('slp_'+k);return s.bedtime&&s.bedtime<='23:00'&&s.bedtime>='12:00'}},
    {label:'Wake time',fn:(data,d)=>wakeHit(d)},

    {label:'Run',fn:(data,d)=>[2,4,6].includes(d.getDay())?data.run===true:null},
    {label:'Calories',fn:(data)=>data.calories===true},
    {label:'Protein 220',fn:(data)=>(parseInt(data.protein)||0)>=220},
    {label:'Water 192oz',fn:(data)=>(parseInt(data.water)||0)>=8},
    {label:'No snack',fn:(data)=>data.nosnack===true},
    {label:'Steps 10k+',fn:(data)=>(parseInt(data.steps)||0)>=10},
    {label:'Creatine',fn:(data)=>data.creatine===true},
    {label:'Visualization',fn:(data)=>data.visualization===true},
    {label:'Journaled',fn:(data)=>data.journal===true},
    {label:'Top 3',fn:(data,d,k)=>{const p=ld('pri_'+k);return[1,2,3].filter(n=>p['d'+n]&&p['p'+n]&&p['p'+n].trim()).length===3}},
    {label:'Kept Word',fn:(data,d,k)=>ld('kw_'+k).value==='yes'},
    {label:'Score 80+',fn:(data,d)=>scoreDay100(d)>=80}
  ];
  const today=new Date();today.setHours(0,0,0,0);
  let out='';
  habits.forEach(hb=>{
    let cells='';
    for(let i=89;i>=0;i--){
      const d=new Date(today);d.setDate(d.getDate()-i);const k=dk(d);
      const data=ld('sc_'+k),logged=hasLogged(d);
      const res=hb.fn(data,d,k);
      let cls='heat-cell';
      if(res===true)cls+=' hit';
      else if(res===null)cls+='';
      else if(logged)cls+=' miss';
      if(i===0)cls+=' today';

    }
    out+=`<div class="heat-row"><span class="heat-label">${hb.label}</span><div class="heat-cells">${cells}</div></div>`;

  return out;
}

function getWeekStart(d){const w=new Date(d);w.setHours(0,0,0,0);w.setDate(w.getDate()-w.getDay());return w}
function calcStreaks(){
  const today=new Date();today.setHours(0,0,0,0);
  let cur=0,best=0,total=0,tmp=0;
  const d=new Date(today);
  for(let i=0;i<365;i++){
    if(hasLogged(d))total++;
    d.setDate(d.getDate()-1);
  }
  const d2=new Date(today);
  for(let i=0;i<365;i++){
    const has=hasLogged(d2);
    if(!has){if(i===0){d2.setDate(d2.getDate()-1);continue;}else break;}
    if(scoreDay100(d2)>=80)cur++;else break;
    d2.setDate(d2.getDate()-1);
  }
  const d3=new Date(today);tmp=0;
  for(let i=0;i<365;i++){
    if(hasLogged(d3)){if(scoreDay100(d3)>=80){tmp++;if(tmp>best)best=tmp}else tmp=0}else tmp=0;
    d3.setDate(d3.getDate()-1);
  }
  return{cur,best,total};
}

function getNextMonday(d){const nd=new Date(d);nd.setHours(0,0,0,0);const dow=nd.getDay();nd.setDate(nd.getDate()+(dow===0?1:8-dow));return nd}
function weeklyReviewStats(d){
  const today=new Date(d);today.setHours(0,0,0,0);
  const days=[];
  for(let i=0;i<7;i++){const wd=new Date(today);wd.setDate(wd.getDate()-i);if(hasLogged(wd))days.push({d:new Date(wd),score:scoreDay100(wd),brk:scoreBreakdown(wd)})}
  if(!days.length)return null;
  const avg=Math.round(days.reduce((s,x)=>s+x.score,0)/days.length);
  const sorted=[...days].sort((a,b)=>b.score-a.score);
  const catSums={},catCounts={};
  days.forEach(x=>Object.keys(x.brk).forEach(k=>{catSums[k]=(catSums[k]||0)+(x.brk[k].max>0?(x.brk[k].earned/x.brk[k].max)*100:0);catCounts[k]=(catCounts[k]||0)+1}));
  const cats=Object.keys(catSums).map(k=>({k,pct:catSums[k]/catCounts[k]})).sort((a,b)=>b.pct-a.pct);
  return {avg,best:sorted[0],worst:sorted[sorted.length-1],strongest:cats[0],weakest:cats[cats.length-1],dayCount:days.length};
}

    }
    h+='</div>';
  });

  // History
  h+=`<div class="hist-title">Recent Entries</div><div id="jHist"></div>`;

        data[p.id]=el.value;sv('j_'+sk,data);flashSave();el.style.height='auto';el.style.height=el.scrollHeight+'px';
        // Sunday Review: pipe np1/np2/np3 to next Monday's priorities
        if(jMode==='weekly'&&(p.id==='np1'||p.id==='np2'||p.id==='np3')){
          const nm=getNextMonday(curDate);const pri=ld('pri_'+dk(nm));
          pri['p'+p.id.slice(-1)]=el.value;sv('pri_'+dk(nm),pri);
        }
      });setTimeout(()=>{el.style.height='auto';el.style.height=el.scrollHeight+'px'},10)}
    }else if(p.type==='gratitude'){
      for(let i=1;i<=3;i++){const el=document.getElementById('ji_'+p.id+'_'+i);if(el)el.addEventListener('input',()=>{data[p.id+'_'+i]=el.value;sv('j_'+sk,data);flashSave()})}
    }else if(p.type==='slider'){
      const el=document.getElementById('ji_'+p.id),vl=document.getElementById('sv_'+p.id);
      if(el)el.addEventListener('input',()=>{const v=parseInt(el.value);data[p.id]=v;sv('j_'+sk,data);flashSave();vl.textContent=v;vl.style.color=v>=9?'#4CAF50':v>=7?'#f5c842':'#ff4444'})

      if(sel.includes(mood))sel=sel.filter(m=>m!==mood);else sel.push(mood);
      data[fld]=sel.join(',');sv('j_'+sk,data);flashSave();pill.classList.toggle('sel');
    })
  });

  // History list
  const hl=document.getElementById('jHist');let entries=[];
  for(let i=0;i<60;i++){
    const d=new Date(curDate);d.setDate(d.getDate()-i);const k=dk(d);
    ['daily','deep','weekly'].forEach(m=>{
      const dd=ld('j_'+k+'_'+m),has=Object.values(dd).some(v=>v&&String(v).trim());
      if(has&&!(dk(d)===dk(curDate)&&m===jMode)){
        let prev=dd.well||dd.energy||dd.wins||Object.values(dd).find(v=>v&&typeof v==='string'&&v.trim())||'';
        entries.push({date:new Date(d),mode:m,preview:String(prev).substring(0,70),score:m==='daily'?dd.discipline:null});
      }
    });
  }
  entries.slice(0,10).forEach(e=>{
    const mc=e.mode==='deep'?'#f5c842':e.mode==='weekly'?'#ff6b35':'#7c8cf5';
    const ml=e.mode==='deep'?'DEEP':e.mode==='weekly'?'WEEKLY':'DAILY';
    const sc=e.score!=null?`<span class="hist-score" style="color:${e.score>=9?'#4CAF50':e.score>=7?'#f5c842':'#ff4444'}">${e.score}/11</span>`:'';
    const card=document.createElement('div');card.className='hist-card';
    card.innerHTML=`<div class="hist-top"><div><span class="hist-date">${DAYS[e.date.getDay()]} ${MO[e.date.getMonth()]} ${e.date.getDate()}</span><span class="hist-type" style="background:${mc}20;color:${mc}">${ml}</span></div>${sc}</div><div class="hist-preview">${e.preview}</div>`;
    card.addEventListener('click',()=>{curDate=new Date(e.date);jMode=e.mode;render();window.scrollTo({top:0,behavior:'smooth'})});
    hl.appendChild(card);
  });
  if(!entries.length)hl.innerHTML='<div style="text-align:center;color:#333;font-size:.75rem;padding:16px">No entries yet</div>';
}
