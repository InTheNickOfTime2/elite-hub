function renderWorkout(){
  const dow=curDate.getDay(),key=dk(curDate),prog=PROGRAMS[dow];
  let h='';

  if(!prog){
    const restRun=renderRunCard();
    if(restRun){h+=restRun;h+=renderMileageCard()}
    h+=renderRhrBanner(curDate);
    h+=renderDontCard(curDate);
    h+=`<div class="wo-rest">
      <div class="wo-rest-icon">&#x1f6cc;</div>
      <h3>${restRun?'No Lifting Today':'Rest &amp; Recovery'}</h3>
      <p>${restRun?'Easy miles only, then recover. Tomorrow\'s the reset — Push A.':'No lifting today. Walk, meal prep, stretch, recover. Tomorrow\'s the reset — Push A.'}</p>
    </div>`;
    document.getElementById('sec-workout').innerHTML=h;
    if(restRun)bindRunCard(dk(curDate));
    return;
  }

  const data=ld('wo_'+key);
  // Training load / readiness
  const load=computeTrainingLoad();
  h+=`<div class="load-card"><span class="load-tag ${load.cls}">${load.tag}</span><span class="load-msg">${load.msg}</span></div>`;
  // Run card + Mileage on run days
  const runCardHTML=renderRunCard();
  if(runCardHTML){h+=runCardHTML;h+=renderMileageCard()}
  h+=renderRhrBanner(curDate);
  h+=renderDontCard(curDate);
  h+=`<div class="wo-header"><div class="wo-day-name">${prog.name}</div><div class="wo-day-sub">${prog.sub}</div></div>`;
  // Workout total timer
  const started=data.startedAt;
  let elapsedStr='00:00';
  let eClass='';
  if(started){
    const endedAt=data.endedAt||Date.now();
    const elapsedMin=(endedAt-started)/60000;
    const h2=Math.floor(elapsedMin/60),m2=Math.floor(elapsedMin%60),s2=Math.floor((elapsedMin*60)%60);
    elapsedStr=(h2>0?h2+':':'')+String(m2).padStart(2,'0')+':'+String(s2).padStart(2,'0');
    if(!data.endedAt)eClass='running';
    if(elapsedMin>90)eClass='long';
  }
  h+=`<div class="wo-elapsed">
    <span class="wo-elapsed-lbl">${data.endedAt?'Duration':(started?'Elapsed':'Workout Time')}</span>
    <span class="wo-elapsed-time ${eClass}" id="woElapsed">${elapsedStr}</span>
    <div class="wo-timing-group">
      <button class="wo-timing-btn am${data.timing==='AM'?' on':''}" data-timing="AM">AM</button>
      <button class="wo-timing-btn pm${data.timing==='PM'?' on':''}" data-timing="PM">PM</button>
    </div>
    <button class="wo-elapsed-btn ${started&&!data.endedAt?'stop':''}" id="woElapsedBtn">${!started?'Start':(data.endedAt?'Reset':'Stop')}</button>
  </div>`;

  // Countdown rest timer
  const tState=timerRunning?'running':timerSec===0?'done':timerSec<=10?'warn':'';
  h+=`<div class="wo-timer-new">
    <div class="wo-timer-top">
      <span class="wo-timer-label">Rest Timer</span>
      <span class="wo-timer-big ${tState}" id="timerDisp">${fmtTime(timerSec)}</span>
    </div>
    <div class="wo-timer-presets">
      ${[60,90,120,180].map(s=>`<button class="wo-timer-preset${timerTarget===s?' active':''}" data-tpre="${s}">${s<60?s+'s':Math.floor(s/60)+(s%60?':'+String(s%60).padStart(2,'0'):':00')}</button>`).join('')}
    </div>
    <div class="wo-timer-ctrls">
      <button class="wo-timer-ctrl go" id="timerBtn">${timerRunning?'Pause':(timerSec>0&&timerSec<timerTarget?'Resume':'Start')}</button>
      <button class="wo-timer-ctrl" id="timerReset">Reset</button>
    </div>
  </div>`;

  prog.exercises.forEach(ex=>{
    h+=`<div class="wo-exercise"><div class="wo-ex-top"><div class="wo-ex-name">${ex.name}</div><div class="wo-ex-target">${ex.sets} x ${ex.reps}</div></div><div class="wo-sets">`;
    h+=`<div class="wo-set-row"><span class="wo-set-num"></span><span class="wo-lbl" style="width:65px">Weight</span><span class="wo-x"></span><span class="wo-lbl" style="width:65px">Reps</span><span style="width:22px"></span></div>`;
    for(let s=1;s<=ex.sets;s++){
      const sk=ex.id+'_s'+s;
      const w=data[sk+'_w']||'';
      const r=data[sk+'_r']||'';
      const done=data[sk+'_d']||false;
      // Get last week's data for placeholder
      const lastWeek=new Date(curDate);lastWeek.setDate(lastWeek.getDate()-7);
      const lwd=ld('wo_'+dk(lastWeek));
      const pw=lwd[sk+'_w']||'';
      const pr=lwd[sk+'_r']||'';
      h+=`<div class="wo-set-row">
        <span class="wo-set-num">S${s}</span>
        <input class="wo-set-input" data-key="${sk}_w" placeholder="${pw?pw+'':'lbs'}" value="${w}">
        <span class="wo-x">x</span>
        <input class="wo-set-input" data-key="${sk}_r" placeholder="${pr?pr+'':'reps'}" value="${r}">
        <div class="wo-check${done?' done':''}" data-key="${sk}_d"><svg viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><polyline points="2.5,7.5 5.5,10.5 11.5,3.5"/></svg></div>
      </div>`;
    }
    h+='</div></div>';
  });

  // Notes
  h+=`<div class="wo-exercise"><div class="wo-note-lbl">Workout Notes</div><textarea id="woNotes" placeholder="How did it feel? Energy? PRs? Pain?">${data.notes||''}</textarea></div>`;
  // PR log
  h+=renderPRLog();

  // Last week comparison
  const lastWeek=new Date(curDate);lastWeek.setDate(lastWeek.getDate()-7);
  const lwd=ld('wo_'+dk(lastWeek));
  if(Object.keys(lwd).length>0){
    h+=`<div class="wo-progress"><div class="wo-prog-title">vs. Last Week</div>`;
    prog.exercises.forEach(ex=>{
      const curBest=getBestSet(data,ex);
      const lastBest=getBestSet(lwd,ex);
      if(lastBest.w>0||curBest.w>0){
        const diff=curBest.w-lastBest.w;
        const arrow=diff>0?'&#9650;':diff<0?'&#9660;':'=';
        const col=diff>0?'#4CAF50':diff<0?'#ff4444':'#666';
        h+=`<div class="wo-prog-row"><span class="wo-prog-name">${ex.name}</span><span class="wo-prog-val" style="color:${col}">${curBest.w>0?curBest.w+'lbs':'--'} ${diff!==0?arrow+' '+Math.abs(diff)+'lbs':''}</span></div>`;
      }
    });
    h+='</div>';
  }

  document.getElementById('sec-workout').innerHTML=h;

  // Workout timer
  const woBtn=document.getElementById('woElapsedBtn');
  if(woBtn)woBtn.addEventListener('click',()=>{
    const d=ld('wo_'+key);
    if(!d.startedAt){d.startedAt=Date.now();if(!d.timing)d.timing=new Date().getHours()<12?'AM':'PM';delete d.endedAt;sv('wo_'+key,d);hap(15)}
    else if(!d.endedAt){d.endedAt=Date.now();sv('wo_'+key,d);hap(18)}
    else{delete d.startedAt;delete d.endedAt;sv('wo_'+key,d);hap(8)}
    renderWorkout();
  });
  // AM/PM timing toggle
  document.querySelectorAll('.wo-timing-btn[data-timing]').forEach(b=>{
    b.addEventListener('click',()=>{const d=ld('wo_'+key);d.timing=b.dataset.timing;sv('wo_'+key,d);hap(10);renderWorkout()});
  });
  // Live-tick elapsed if running
  if(data.startedAt&&!data.endedAt){
    if(window._woTickInt)clearInterval(window._woTickInt);
    window._woTickInt=setInterval(()=>{
      const el=document.getElementById('woElapsed');if(!el){clearInterval(window._woTickInt);return}
      const elapsedMin=(Date.now()-data.startedAt)/60000;
      const h2=Math.floor(elapsedMin/60),m2=Math.floor(elapsedMin%60),s2=Math.floor((elapsedMin*60)%60);
      el.textContent=(h2>0?h2+':':'')+String(m2).padStart(2,'0')+':'+String(s2).padStart(2,'0');
      el.className='wo-elapsed-time '+(elapsedMin>90?'long':'running');
    },1000);
  }

  // Run card bindings
  bindRunCard(key);

  // Bind workout inputs
  document.querySelectorAll('.wo-set-input[data-key]').forEach(el=>{
    el.addEventListener('change',()=>{
      const k=el.dataset.key;data[k]=el.value;sv('wo_'+key,data);
      if(k.endsWith('_w')){
        const lastWeek=new Date(curDate);lastWeek.setDate(lastWeek.getDate()-7);
        const lwd=ld('wo_'+dk(lastWeek));
        const cur=parseFloat(el.value)||0,last=parseFloat(lwd[k])||0;
        const prKey=k+'_pr';
        if(cur>0&&last>0&&cur>last&&!data[prKey]){
          const exId=k.split('_s')[0];
          const setNum=(k.match(/_s(\d+)_/)||[])[1];
          const ex=prog.exercises.find(x=>x.id===exId);
          const delta=+(cur-last).toFixed(1);
          const log=JSON.parse(localStorage.getItem('eh_pr_log')||'[]');
          log.unshift({date:dk(curDate),exId,exName:ex?ex.name:exId,set:setNum,prev:last,cur,delta});
          localStorage.setItem('eh_pr_log',JSON.stringify(log.slice(0,60)));
          celebratePR(delta+' lbs',ex?ex.name:'');
          data[prKey]=true;sv('wo_'+key,data);
        }
      }
    });
    el.addEventListener('input',()=>{data[el.dataset.key]=el.value;sv('wo_'+key,data)});
  });
  document.querySelectorAll('.wo-check[data-key]').forEach(el=>{
    el.addEventListener('click',()=>{data[el.dataset.key]=!data[el.dataset.key];sv('wo_'+key,data);el.classList.toggle('done')});
  });
  const notes=document.getElementById('woNotes');
  if(notes)notes.addEventListener('input',()=>{data.notes=notes.value;sv('wo_'+key,data)});

  // Timer — countdown
  document.querySelectorAll('.wo-timer-preset[data-tpre]').forEach(b=>{
    b.addEventListener('click',()=>{clearInterval(timerInterval);timerRunning=false;timerTarget=parseInt(b.dataset.tpre);timerSec=timerTarget;renderWorkout()});
  });
  document.getElementById('timerBtn').addEventListener('click',()=>{
    if(timerRunning){clearInterval(timerInterval);timerRunning=false;renderWorkout();return}
    if(timerSec===0)timerSec=timerTarget;
    timerRunning=true;
    const tick=()=>{
      timerSec--;
      const d=document.getElementById('timerDisp');
      if(d){d.textContent=fmtTime(timerSec);d.className='wo-timer-big '+(timerSec===0?'done':timerSec<=10?'warn':'running')}
      if(timerSec<=0){
        clearInterval(timerInterval);timerRunning=false;
        if(navigator.vibrate)navigator.vibrate([300,120,300,120,500]);
        try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,.25,.5].forEach(t=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0,ctx.currentTime+t);g.gain.linearRampToValueAtTime(.3,ctx.currentTime+t+.02);g.gain.linearRampToValueAtTime(0,ctx.currentTime+t+.2);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.2)})}catch{}
        setTimeout(renderWorkout,100);
      }
    };
    timerInterval=setInterval(tick,1000);
    renderWorkout();
  });
  document.getElementById('timerReset').addEventListener('click',()=>{clearInterval(timerInterval);timerRunning=false;timerSec=timerTarget;renderWorkout()});
  // PR log toggle
  const prHdr=document.getElementById('prLogHdr');
  if(prHdr)prHdr.addEventListener('click',()=>{
    const c=document.getElementById('prLogCard'),a=document.getElementById('prLogArrow');
    const op=c.classList.toggle('open');localStorage.setItem('eh_pr_open',op?'1':'0');a.textContent=op?'▲':'▼';hap(6);
  });
}

function getBestSet(data,ex){
  let best={w:0,r:0};
  for(let s=1;s<=ex.sets;s++){
    const w=parseInt(data[ex.id+'_s'+s+'_w'])||0;
    const r=parseInt(data[ex.id+'_s'+s+'_r'])||0;
    if(w>best.w)best={w,r};
  }
  return best;
}
function fmtTime(s){const m=Math.floor(s/60);return String(m).padStart(1,'0')+':'+String(s%60).padStart(2,'0')}

document.addEventListener('touchstart',e=>{
  const t=e.target;
  if(t.closest('input,textarea,button,[contenteditable],.tier-pill,.bar,.d100-tile,.check-item,.met-row,.tox-item,.kw-btn,.pri-chk,.pri-input,.mood-pill,.j-tab,.wo-set-input,.focus-mode,.quote-box'))return;
  tsX=e.touches[0].clientX;tsY=e.touches[0].clientY;tsT=Date.now();
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!tsX)return;
  const dx=e.changedTouches[0].clientX-tsX,dy=e.changedTouches[0].clientY-tsY,dt=Date.now()-tsT;
  tsX=0;
  if(dt>600)return;
  if(Math.abs(dx)>70&&Math.abs(dy)<45){
    if(dx>0)curDate.setDate(curDate.getDate()-1);else curDate.setDate(curDate.getDate()+1);
    hap(15);render();
  }
},{passive:true});

// Focus mode
let focusInterval=null,focusSec=2700,focusTarget=2700,focusRunning=false;
function fmtFocusTime(s){const m=Math.floor(s/60);return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function updateFocus(){const d=document.getElementById('focusTime');if(!d)return;d.textContent=fmtFocusTime(focusSec);d.className='focus-time '+(focusSec<=0?'done':focusRunning?(focusSec<=30?'warn':'running'):'')}
function openFocus(){
  const m=document.getElementById('focusMode');m.classList.add('on');
  const task=document.getElementById('focusTask');
  if(!task.textContent.trim()){
    const pri=ld('pri_'+dk(curDate));
    for(let n=1;n<=3;n++){if(pri['p'+n]&&!pri['d'+n]){task.textContent=pri['p'+n];break}}
  }
  const q=QUOTES[Math.floor(Math.random()*QUOTES.length)];
  document.getElementById('focusQuote').textContent='"'+q.t+'"'+(q.a?' — '+q.a:'');
  updateFocus();
  document.body.style.overflow='hidden';
}
function closeFocus(){
  document.getElementById('focusMode').classList.remove('on');
  if(focusRunning){clearInterval(focusInterval);focusRunning=false;document.getElementById('focusBtn').textContent='Start'}
  document.body.style.overflow='';
}
document.getElementById('focusFab').addEventListener('click',()=>{hap(12);openFocus()});

document.querySelectorAll('.focus-preset[data-fpre]').forEach(b=>{
  b.addEventListener('click',()=>{
    hap(10);focusTarget=parseInt(b.dataset.fpre);focusSec=focusTarget;
    document.querySelectorAll('.focus-preset').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    clearInterval(focusInterval);focusRunning=false;
    document.getElementById('focusBtn').textContent='Start';
    updateFocus();
  });
});
document.getElementById('focusBtn').addEventListener('click',()=>{
  hap(10);
  const btn=document.getElementById('focusBtn');
  if(focusRunning){clearInterval(focusInterval);focusRunning=false;btn.textContent='Resume';updateFocus();return}
  if(focusSec<=0)focusSec=focusTarget;
  focusRunning=true;btn.textContent='Pause';
  focusInterval=setInterval(()=>{
    focusSec--;updateFocus();
    if(focusSec<=0){
      clearInterval(focusInterval);focusRunning=false;btn.textContent='Start';
      if(navigator.vibrate)try{navigator.vibrate([400,150,400,150,800])}catch{}
      try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,.3,.6,.9].forEach(t=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0,ctx.currentTime+t);g.gain.linearRampToValueAtTime(.3,ctx.currentTime+t+.02);g.gain.linearRampToValueAtTime(0,ctx.currentTime+t+.25);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.25)})}catch{}
    }
  },1000);
});
document.getElementById('focusReset').addEventListener('click',()=>{hap(8);clearInterval(focusInterval);focusRunning=false;focusSec=focusTarget;document.getElementById('focusBtn').textContent='Start';updateFocus()});

document.getElementById('btnReset').addEventListener('click',()=>{

  const datePattern=/_\d{4}-\d{2}-\d{2}$/;
  const alwaysDelete=['eh_pr_log','eh_weight_milestones','eh_race_check'];
  const toDel=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);if(!k||!k.startsWith('eh_'))continue;

  alert(`Cleared ${toDel.length} entries. 100-Day Build reset to today. Reloading.`);

});

// ===== CLOUD SYNC (Supabase) =====
const SB_URL='https://tdgzcxqmrylrazeuizar.supabase.co';
const SB_PUB='sb_publishable_9Bd_P3GLGZ5eMu66qEemlQ_PZ6WkVqi';
let sbClient=null,sbUser=null,sbSyncTimer=null,sbSyncing=false,sbLastSync=null,sbPulling=false;
function initSb(tries){
  tries=tries||0;
  if(typeof supabase==='undefined'){if(tries>40){console.warn('Supabase SDK failed to load');updateSbStatus();return}setTimeout(()=>initSb(tries+1),100);return}
  try{
    sbClient=supabase.createClient(SB_URL,SB_PUB,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
    sbClient.auth.onAuthStateChange((event,session)=>{
      sbUser=session?.user||null;
      updateSbStatus();
      if(event==='SIGNED_IN')pullRemote();
    });
    sbClient.auth.getSession().then(({data})=>{sbUser=data.session?.user||null;updateSbStatus();if(sbUser)pullRemote()});
  }catch(e){console.error('Supabase init failed',e)}
}
async function sbSendCode(email){
  if(!sbClient)return false;
  const{error}=await sbClient.auth.signInWithOtp({email,options:{shouldCreateUser:true,emailRedirectTo:window.location.href}});
  if(error){alert('Send code error: '+error.message);return false}
  return true;
}
async function sbVerifyCode(email,code){
  if(!sbClient)return false;
  const{data,error}=await sbClient.auth.verifyOtp({email,token:code.trim(),type:'email'});
  if(error){alert('Verify error: '+error.message);return false}
  return true;
}
async function sbSignOut(){if(sbClient)await sbClient.auth.signOut();sbUser=null;updateSbStatus()}
async function pullRemote(){
  if(!sbClient||!sbUser||sbPulling)return;
  sbPulling=true;sbSyncing=true;updateSbStatus();
  try{
    const{data,error}=await sbClient.from('user_data').select('data,updated_at').eq('user_id',sbUser.id).maybeSingle();
    if(error){console.error('pull error',error);return}
    if(data&&data.data){
      Object.keys(data.data).forEach(k=>{if(k.startsWith('eh_')){_origSetItem.call(localStorage,k,data.data[k])}});
      sbLastSync=new Date();
    }else{
      // No remote yet — push current local
      await pushLocalNow();
    }
  }catch(e){console.error('pull exception',e)}
  finally{sbPulling=false;sbSyncing=false;updateSbStatus()}
}
async function pushLocalNow(){
  if(!sbClient||!sbUser)return;
  sbSyncing=true;updateSbStatus();
  try{
    const blob={};
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('eh_')&&!k.startsWith('eh_sb_'))blob[k]=localStorage.getItem(k)}
    const{error}=await sbClient.from('user_data').upsert({user_id:sbUser.id,data:blob,updated_at:new Date().toISOString()});
    if(error)throw error;
    sbLastSync=new Date();
  }catch(e){console.error('push error',e);alert('Push failed: '+(e.message||e))}
  finally{sbSyncing=false;updateSbStatus()}
}
function pushLocalDebounced(){
  if(!sbClient||!sbUser||sbPulling)return;
  clearTimeout(sbSyncTimer);
  sbSyncTimer=setTimeout(pushLocalNow,2000);
}
function agoLbl(d){if(!d)return'just now';const s=Math.round((Date.now()-d)/1000);if(s<60)return s+'s ago';if(s<3600)return Math.round(s/60)+'m ago';return Math.round(s/3600)+'h ago'}
function updateSbStatus(){
  const st=document.getElementById('sbStatus');
  const btn=document.getElementById('btnSync');
  let cls='offline',txt='Not signed in';
  if(!sbClient){cls='offline';txt='SDK loading...'}
  else if(sbSyncing){cls='syncing';txt='Syncing...'}
  else if(sbUser){cls='synced';txt='Synced · '+agoLbl(sbLastSync)}
  if(st)st.innerHTML=`<div class="sb-status-dot ${cls}"></div><span>${txt}</span>`;
  if(btn){
    if(sbUser)btn.textContent='Cloud · '+(sbSyncing?'syncing':agoLbl(sbLastSync));
    else btn.textContent='Cloud Sync';
  }
  renderSbModalBody();
}
function renderSbModalBody(){
  const body=document.getElementById('sbModalBody');if(!body)return;
  if(!sbClient){body.innerHTML='<div class="sb-modal-body">Supabase SDK still loading. Wait a second and reopen.</div>';return}
  if(!sbUser){
    const step=window._sbStep||'email';
    const savedEmail=window._sbEmail||'';
    if(step==='email'){
      body.innerHTML=`
        <div class="sb-modal-body">Sign in to sync across devices. We'll email you a <b>6-digit code</b>. Works in Safari, home-screen icon, anywhere.</div>
        <div class="sb-field"><label>Email</label><input type="email" id="sbEmail" placeholder="you@email.com" autocomplete="email" value="${savedEmail}"></div>
        <div class="sb-modal-actions">
          <button class="sb-modal-btn" id="sbSendBtn">Send Code</button>
          <button class="sb-modal-btn secondary" id="sbCloseBtn">Close</button>
        </div>
      `;
      document.getElementById('sbSendBtn').addEventListener('click',async()=>{
        const email=document.getElementById('sbEmail').value.trim();if(!email){alert('Enter your email.');return}
        const btn=document.getElementById('sbSendBtn');btn.textContent='Sending...';btn.disabled=true;
        const ok=await sbSendCode(email);
        btn.textContent='Send Code';btn.disabled=false;
        if(ok){window._sbEmail=email;window._sbStep='code';renderSbModalBody()}
      });
      document.getElementById('sbCloseBtn').addEventListener('click',()=>document.getElementById('sbModal').classList.remove('on'));
    }else{
      body.innerHTML=`
        <div class="sb-modal-body">We sent a code to <b>${savedEmail}</b>. Check your inbox (and spam). Enter the code below. Expires in ~15 min.</div>
        <div class="sb-field"><label>Code from email</label><input type="text" id="sbCode" placeholder="e.g. 12345678" inputmode="numeric" autocomplete="one-time-code" maxlength="10" style="font-size:1.2rem;letter-spacing:4px;text-align:center;font-variant-numeric:tabular-nums"></div>
        <div class="sb-modal-actions">
          <button class="sb-modal-btn" id="sbVerifyBtn">Verify</button>
          <button class="sb-modal-btn secondary" id="sbBackBtn">Back</button>
          <button class="sb-modal-btn secondary" id="sbCloseBtn">Close</button>
        </div>
      `;
      setTimeout(()=>document.getElementById('sbCode').focus(),20);
      document.getElementById('sbVerifyBtn').addEventListener('click',async()=>{
        const code=document.getElementById('sbCode').value.trim();if(!code||code.length<4){alert('Enter the code from the email.');return}
        const btn=document.getElementById('sbVerifyBtn');btn.textContent='Verifying...';btn.disabled=true;
        const ok=await sbVerifyCode(savedEmail,code);
        btn.textContent='Verify';btn.disabled=false;
        if(ok){window._sbStep='email';window._sbEmail=''}
      });
      document.getElementById('sbCode').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('sbVerifyBtn').click()});
      document.getElementById('sbBackBtn').addEventListener('click',()=>{window._sbStep='email';renderSbModalBody()});
      document.getElementById('sbCloseBtn').addEventListener('click',()=>document.getElementById('sbModal').classList.remove('on'));
    }
  }else{
    body.innerHTML=`
      <div class="sb-modal-body">Signed in as <b>${sbUser.email}</b>. Data auto-syncs 2 seconds after any change. Open Elite Hub on another device, sign in with this email, and your data appears there too.</div>
      <div class="sb-modal-actions">
        <button class="sb-modal-btn" id="sbPushBtn">Push Now</button>
        <button class="sb-modal-btn" id="sbPullBtn">Pull Now</button>
        <button class="sb-modal-btn danger" id="sbOutBtn">Sign Out</button>
        <button class="sb-modal-btn secondary" id="sbCloseBtn">Close</button>
      </div>
    `;
    document.getElementById('sbPushBtn').addEventListener('click',async()=>{clearTimeout(sbSyncTimer);sbSyncTimer=null;await pushLocalNow()});
    document.getElementById('sbPullBtn').addEventListener('click',async()=>{if(confirm('Pull cloud data? This replaces any local changes not yet synced.'))await pullRemote()});
    document.getElementById('sbOutBtn').addEventListener('click',async()=>{if(confirm('Sign out of Cloud Sync?')){await sbSignOut();renderSbModalBody()}});
    document.getElementById('sbCloseBtn').addEventListener('click',()=>document.getElementById('sbModal').classList.remove('on'));
  }
}

  const r=new FileReader();
  r.onload=ev=>{
    try{
      const j=JSON.parse(ev.target.result);const d=j.data||j;
      if(!confirm('Import will REPLACE all current data. Continue?'))return;
      Object.keys(localStorage).filter(k=>k.startsWith('eh_')).forEach(k=>localStorage.removeItem(k));
      Object.keys(d).forEach(k=>{if(k.startsWith('eh_'))localStorage.setItem(k,d[k])});
      alert('Import complete. Reloading.');location.reload();
    }catch(err){alert('Import failed: '+err.message)}
  };

});

// Apple Health ingest (iOS Shortcut):
//   elite-hub.html?steps=12345&sleep=7.4&bed=23:41&wake=06:12&runmi=5.2&runmin=63&wt=268.4[&score=][&d=YYYY-MM-DD]
// Any subset of params works. Sleep values apply to last night (today's date key).
// A synced run also auto-checks the scorecard Run item.
(function(){
  try{
    const q=new URLSearchParams(location.search);
    const dparam=q.get('d')||'';
    const dkey=/^\d{4}-\d{2}-\d{2}$/.test(dparam)?dparam:dk(new Date());
    const synced=[];
    const n=parseInt(q.get('steps'));
    if(n>0){
      const s=ld('steps_'+dkey);s.count=n;s.src='health';sv('steps_'+dkey,s);
      syncStepsTier(dkey,n);
      synced.push(n.toLocaleString()+' steps');
    }
    const rmi=parseFloat(q.get('runmi')),rmin=parseFloat(q.get('runmin'));
    if(rmi>0){
      const r=ld('run_'+dkey);
      r.miles=Math.round(rmi*100)/100;
      if(rmin>0)r.timeMin=Math.round(rmin*10)/10;
      r.src='health';sv('run_'+dkey,r);
      const scr=ld('sc_'+dkey);if(scr.run!==true){scr.run=true;sv('sc_'+dkey,scr)}
      synced.push(r.miles+'mi run');
    }
    const wtl=parseFloat(q.get('wt'));
    if(wtl>50&&wtl<500){
      const w=ld('wt_'+dkey);w.lbs=Math.round(wtl*10)/10;w.src='health';sv('wt_'+dkey,w);
      synced.push(w.lbs+' lbs');
    }
    const rhr=parseFloat(q.get('rhr'));
    if(rhr>=30&&rhr<=120){
      const r=ld('rhr_'+dkey);r.bpm=Math.round(rhr);r.src='health';sv('rhr_'+dkey,r);
      synced.push('RHR '+Math.round(rhr));
    }
    const hrs=parseFloat(q.get('sleep'));
    const bed=(q.get('bed')||'').match(/^\d{1,2}:\d{2}$/)?q.get('bed').padStart(5,'0'):'';
    const wake=(q.get('wake')||'').match(/^\d{1,2}:\d{2}$/)?q.get('wake').padStart(5,'0'):'';
    const score=parseInt(q.get('score'));
    if(hrs>0||bed||wake){
      const sl=ld('slp_'+dkey);
      if(hrs>0)sl.hours=Math.round(hrs*10)/10;
      if(bed)sl.bedtime=bed;
      if(wake)sl.wake=wake;
      if(score>0&&score<=100)sl.score=score;
      sl.src='health';sv('slp_'+dkey,sl);
      if(hrs>0)synced.push(sl.hours+'h sleep');
      else synced.push('sleep times');
    }
    if(synced.length){
      history.replaceState(null,'',location.pathname);
      const toast=document.createElement('div');
      toast.textContent=synced.join(' · ')+' synced from Apple Watch';
      toast.style.cssText='position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#10b981;color:#000;font-weight:800;font-size:.75rem;padding:8px 16px;border-radius:20px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.4)';
      document.body.appendChild(toast);
      setTimeout(()=>toast.remove(),3500);
      hap(20);
    }
  }catch(e){}
})();
