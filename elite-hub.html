<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Elite Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0a0a0f;
  --card:#12121a;
  --card-deep:#0e0e16;
  --card-alt:#14141e;
  --card-hover:#16161f;
  --border:#1e1e2e;
  --border-soft:#1a1a24;
  --border-strong:#252535;
  --border-stronger:#2a2a3a;
  --text:#e0e0e0;
  --text-strong:#fff;
  --text-soft:#ddd;
  --text-muted:#888;
  --text-faint:#666;
  --text-ghost:#444;
  --text-fade:#333;
  color-scheme:dark;
}
html.light-mode{
  --bg:#f0ebe0;
  --card:#ffffff;
  --card-deep:#f8f3e7;
  --card-alt:#f3eedf;
  --card-hover:#eae4d3;
  --border:#ddd5c2;
  --border-soft:#e5decc;
  --border-strong:#c9c0ac;
  --border-stronger:#b5ac99;
  --text:#1a1a24;
  --text-strong:#0a0a12;
  --text-soft:#2a2a34;
  --text-muted:#5a5a65;
  --text-faint:#7a7a85;
  --text-ghost:#a5a5ae;
  --text-fade:#c0c0c7;
  color-scheme:light;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .25s,color .25s}
/* Light-mode specialty overrides (keep accent tones; soften bg) */
html.light-mode .why-card{background:linear-gradient(135deg,#fff5e8,#fff);border-color:#e8c5a3}
html.light-mode .why-text{color:#5a3520}
html.light-mode .why-text.empty{color:#b5a18a}
html.light-mode .why-edit{background:#fff;color:#5a3520;border-color:#e8c5a3}
html.light-mode .weak-card{background:linear-gradient(135deg,#f3efff,#fff);border-color:#c5b8e8}
html.light-mode .weak-item{color:#2a2a34}
html.light-mode .trig-card{background:linear-gradient(135deg,#f3efff,#fff);border-color:#c5b8e8}
html.light-mode .recal-card{background:linear-gradient(135deg,#ffeaea,#fff5f5);border-color:#e8a8a8}
html.light-mode .recal-sub{color:#3a2020}
html.light-mode .recal-q textarea{background:#fff;color:#2a2a34;border-color:#e8c8c8}
html.light-mode .tox-card{background:linear-gradient(135deg,#ffeeee,#fff5f2);border-color:#e8c8c8}
html.light-mode .callout.l1{background:linear-gradient(135deg,#fff6e0,#fff);border-color:#e8c890;color:#a87200}
html.light-mode .callout.l2{background:linear-gradient(135deg,#ffeadb,#fff);border-color:#e8b890;color:#b54a00}
html.light-mode .callout.l3{background:linear-gradient(135deg,#ffdbdb,#fff);border-color:#e89090;color:#a02020}
html.light-mode .callout-msg{color:#2a2a34}
html.light-mode .quote-box{background:linear-gradient(135deg,#fff,#faf3e3);border-color:#d5cdb8;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 4px 20px rgba(0,0,0,.05)}
html.light-mode .quote-text{color:#2a1f10}
html.light-mode .quote-author{color:#6a6a75}
html.light-mode .quote-box::after{color:rgba(245,200,66,.2)}
html.light-mode .miss-card{background:linear-gradient(135deg,#fff6f9,#fff);border-color:#e8c8d4}
html.light-mode .miss-note{background:#fff;border-color:#e8c8d4;color:#2a2a34}
html.light-mode .kw-card{background:linear-gradient(135deg,var(--card-alt),var(--card))}
html.light-mode .kw-note{background:#fff;border-color:var(--border);color:var(--text)}
html.light-mode .sup-card,html.light-mode .pri-card,html.light-mode .rollup-card,html.light-mode .d100-card,html.light-mode .plan-card,html.light-mode .sr-stats,html.light-mode .nut-score-card,html.light-mode .nut-editor{background:var(--card)}
html.light-mode .sup-stack{background:var(--card-deep)}
html.light-mode .sup-stack:hover{background:var(--card-hover)}
html.light-mode .sup-stack.on{background:#e8f0ff;border-color:#3b82f6}
html.light-mode .sup-stack.on .sup-name{color:#1d4ed8}
html.light-mode .pri-input{color:var(--text)}
html.light-mode .check-item.checked{background:#eaf4ea;border-color:#b8d4b8}
html.light-mode .check-item.yn.nope{background:#fbeaea;border-color:#e8b8b8}
html.light-mode .focus-mode{background:radial-gradient(ellipse at top,#f8f3e7,#f0ebe0 80%)}
html.light-mode .focus-task{color:#2a1f10}
html.light-mode .focus-quote{color:#7a7a85}
html.light-mode .focus-preset{background:#fff;border-color:var(--border)}
html.light-mode .focus-ctrl.sec{background:#fff;border-color:var(--border);color:var(--text-muted)}
html.light-mode input[type=range]{background:#d5cdb8}
html.light-mode textarea,html.light-mode .j-input,html.light-mode .grat-item input,html.light-mode .nut-add input,html.light-mode .wo-set-input,html.light-mode .nut-editor-field input,html.light-mode .nut-preset-item input,html.light-mode .met-edit-field input,html.light-mode .wt-goal-input{background:#fff;color:var(--text);border-color:var(--border)}
html.light-mode .pri-chk{border-color:var(--border-strong)}
html.light-mode .chkbox{border-color:var(--border-strong)}
html.light-mode .wo-check{border-color:#b8d4b8}
html.light-mode .mood-pill{background:var(--card-deep);border-color:var(--border-strong)}
html.light-mode .wo-exercise,html.light-mode .wo-progress,html.light-mode .wo-timer-new{background:var(--card)}
html.light-mode .wo-day-name{color:#0a7f3a}
html.light-mode .wo-timer-ctrl{background:var(--card);color:var(--text-muted)}
html.light-mode .wo-timer-ctrl.go{background:#eaf4ea;color:#0a7f3a;border-color:#b8d4b8}
html.light-mode .callout-x{color:var(--text-faint)}
html.light-mode .bottom-nav{background:var(--card);border-top:1px solid var(--border);box-shadow:0 -2px 8px rgba(0,0,0,.05)}
html.light-mode .nav-btn{color:var(--text-faint)}
html.light-mode .nav-btn.active{color:#b8850f}
html.light-mode .d100-bar,html.light-mode .d100-timeline{background:var(--card-deep);border-color:var(--border-soft)}
html.light-mode .d100-tile{background:var(--border-soft)}
html.light-mode .d100-tile.missed{background:#f5d8d8}
html.light-mode .heat-wrap{background:var(--card-deep)}
html.light-mode .heat-cell{background:var(--border-soft)}
html.light-mode .heat-cell.miss{background:#f5c8c8}
html.light-mode .cat-breakdown{background:var(--card-deep)}
html.light-mode .cat-bar{background:var(--border-soft)}
html.light-mode .rollup-week-bar{filter:brightness(.92)}
html.light-mode .nut-macros{background:var(--card)}
html.light-mode .nut-mac-bar{background:var(--border-soft)}
html.light-mode .nut-meals{background:var(--card)}
html.light-mode .wt-card{background:var(--card)}
html.light-mode .wt-chart{background:var(--card-deep);border-color:var(--border-soft)}
html.light-mode .settings-row{border-top:1px solid var(--border)}
html.light-mode .settings-btn{color:var(--text-muted)}
html.light-mode .custom-add{color:var(--text-muted);border-color:var(--border-strong)}
html.light-mode .custom-edit{background:var(--card);border-color:var(--border-strong)}
html.light-mode .week-box{background:var(--card)}
html.light-mode .streak-card{background:var(--card)}
html.light-mode .check-item{background:var(--card)}
html.light-mode .check-item:hover{background:var(--card-hover)}
.app{max-width:840px;margin:0 auto;padding:18px 22px 110px}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:center;margin-bottom:18px;gap:8px}
.topbar h1{font-size:1.3rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,#f5c842,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card-deep);border-top:1px solid #1a1a28;display:flex;z-index:100;padding:6px 0 env(safe-area-inset-bottom,8px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;background:none;border:none;color:#444;cursor:pointer;font-family:inherit;transition:color .2s}
.nav-btn.active{color:#f5c842}
.nav-btn svg{width:22px;height:22px}
.nav-btn span{font-size:.6rem;font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* Date nav */
.date-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px}
.date-nav button{background:var(--card-alt);border:1px solid var(--border-strong);color:#888;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;transition:all .2s}
.date-nav button:hover{background:#1e1e2e;color:#fff}
.date-text{font-size:.95rem;font-weight:600;min-width:210px;text-align:center}
.date-text .day{color:#f5c842}
.badge{display:inline-block;font-size:.5rem;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;vertical-align:middle;margin-left:6px}

/* Why card */
.why-card{background:linear-gradient(135deg,#1a0e08,#14141e);border:1px solid #3a1a10;border-radius:13px;padding:14px 18px;margin-bottom:14px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .2s}
.why-card:hover{border-color:#5a2a1a}
.why-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#ff6b35,#ef4444)}
.why-label{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:#ff6b35;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.why-label::before{content:'';width:5px;height:5px;border-radius:50%;background:#ff6b35}
.why-text{font-size:.92rem;line-height:1.5;color:#e8d4c8;font-weight:500;font-style:italic;min-height:22px;white-space:pre-wrap;word-break:break-word}
.why-text.empty{color:#5a3a2a;font-weight:400}
.why-edit{display:none;width:100%;background:var(--card-deep);border:1px solid #3a1a10;border-radius:8px;color:#e8d4c8;font-family:inherit;font-size:.92rem;line-height:1.5;padding:10px 12px;resize:vertical;min-height:80px;outline:none;font-style:italic}
.why-edit:focus{border-color:#ff6b35}
.why-card.editing .why-text{display:none}
.why-card.editing .why-edit{display:block}
.why-card.editing{cursor:default}
.why-hint{font-size:.58rem;color:#5a3a2a;margin-top:6px;letter-spacing:1px;text-transform:uppercase;font-weight:600}

/* Supplement Stacks */
.sup-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:0;margin:16px 0;overflow:hidden}
.sup-header{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;transition:background .15s}
.sup-header:hover{background:var(--card-hover)}
.sup-title{font-size:.62rem;letter-spacing:2.5px;text-transform:uppercase;color:#aaa;font-weight:800;display:flex;align-items:center;gap:7px}
.sup-title::before{content:'';width:6px;height:6px;border-radius:50%;background:#3b82f6}
.sup-count{font-size:.65rem;color:#666;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.5px}
.sup-count b{color:#3b82f6;font-weight:800}
.sup-count.full b{color:#10b981}
.sup-body{display:none;padding:4px 10px 10px;border-top:1px solid var(--border-soft)}
.sup-card.open .sup-body{display:block}
.sup-stack{display:flex;align-items:center;padding:9px 8px;margin:4px 0;background:var(--card-deep);border:1px solid var(--border-soft);border-radius:8px;cursor:pointer;transition:all .15s;user-select:none;-webkit-user-select:none}
.sup-stack:hover{background:#15151f;border-color:#2a2a3a}
.sup-stack.on{background:#0f1a24;border-color:#3b82f6}
.sup-chk{width:18px;height:18px;border-radius:5px;border:2px solid #2a3544;margin-right:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sup-stack.on .sup-chk{background:#3b82f6;border-color:#3b82f6}
.sup-chk svg{width:10px;height:10px;opacity:0}
.sup-stack.on .sup-chk svg{opacity:1}
.sup-info{flex:1;min-width:0}
.sup-name{font-size:.78rem;font-weight:700;color:var(--text-soft);letter-spacing:.3px}
.sup-stack.on .sup-name{color:#a8c8ff}
.sup-items{font-size:.6rem;color:#666;margin-top:2px;line-height:1.4;letter-spacing:.2px}

/* Meal plan card */
.plan-card{background:linear-gradient(135deg,var(--card-alt),var(--card));border:1px solid var(--border-stronger);border-radius:13px;padding:0;margin-bottom:14px;overflow:hidden}
.plan-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border-soft)}
.plan-title{font-size:.62rem;letter-spacing:2.5px;text-transform:uppercase;color:#aaa;font-weight:800}
.plan-day-toggle{display:flex;gap:0;background:var(--card-deep);border:1px solid var(--border-strong);border-radius:8px;overflow:hidden}
.plan-day-btn{background:none;border:none;color:#666;padding:5px 11px;font-family:inherit;font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.plan-day-btn.on{background:#1a2a1a;color:#4CAF50}
.plan-day-btn:hover{color:var(--text-soft)}
.plan-meals{padding:6px 10px 10px}
.plan-meal{display:flex;align-items:center;padding:10px 8px;margin:4px 0;background:var(--card-deep);border:1px solid var(--border-soft);border-radius:9px;cursor:pointer;transition:all .15s;gap:10px}
.plan-meal:hover{background:#15151f;border-color:#2a3a2a}
.plan-meal.logged{background:#0f1a0f;border-color:#2a4a2a;opacity:.7}
.plan-meal-slot{font-size:.55rem;color:#666;font-weight:800;letter-spacing:1.5px;min-width:38px;text-align:center}
.plan-meal.logged .plan-meal-slot{color:#4CAF50}
.plan-meal-body{flex:1;min-width:0}
.plan-meal-name{font-size:.78rem;font-weight:700;color:var(--text-soft);letter-spacing:.3px}
.plan-meal-items{font-size:.62rem;color:#666;margin-top:2px;line-height:1.45}
.plan-meal-macros{font-size:.65rem;color:#888;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;margin-right:3px;letter-spacing:.3px}
.plan-meal-add{font-size:1.1rem;color:#555;padding:2px 6px;font-weight:800;line-height:1}
.plan-meal:hover .plan-meal-add{color:#4CAF50}
.plan-meal.logged .plan-meal-add{display:none}
.plan-meal-chk{color:#4CAF50;display:none;font-size:.9rem}
.plan-meal.logged .plan-meal-chk{display:inline-block}
.plan-totals{display:flex;justify-content:space-around;padding:10px;border-top:1px solid var(--border-soft);background:#0a0a10;font-size:.62rem;color:#666;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.plan-totals span b{color:var(--text);font-variant-numeric:tabular-nums;font-weight:800;margin-left:4px;font-size:.72rem;letter-spacing:0}

/* Monthly Rollup */
.rollup-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;margin-top:16px}
.rollup-title{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:#666;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.rollup-title small{font-size:.55rem;color:#3a3a4a;font-weight:700;letter-spacing:1px;text-transform:none}
.rollup-hero{display:flex;align-items:stretch;gap:14px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border-soft)}
.rollup-avg-box{display:flex;flex-direction:column}
.rollup-avg{font-size:2.2rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.rollup-avg-lbl{font-size:.54rem;color:#666;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;font-weight:700}
.rollup-indices{display:flex;gap:14px;flex:1;justify-content:flex-end;align-items:center}
.rollup-idx{display:flex;flex-direction:column;align-items:center}
.rollup-idx-val{font-size:1.15rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.rollup-idx-lbl{font-size:.52rem;color:#666;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;font-weight:700}
.rollup-weeks{display:flex;gap:6px;height:54px;align-items:flex-end;margin-bottom:6px}
.rollup-week{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.rollup-week-w{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
.rollup-week-bar{width:100%;max-width:32px;min-height:3px;border-radius:3px 3px 0 0;transition:height .4s,background .3s}
.rollup-week-lbl{font-size:.52rem;color:#444;letter-spacing:.5px;font-weight:700}
.rollup-week-val{font-size:.58rem;color:#888;font-weight:800;font-variant-numeric:tabular-nums;margin-bottom:2px}
.rollup-trend{display:flex;justify-content:space-between;align-items:center;font-size:.6rem;color:#666;letter-spacing:.5px;margin:6px 0 12px;font-weight:600}
.rollup-trend b{font-variant-numeric:tabular-nums;font-weight:800;font-size:.72rem;margin-left:3px}
.rollup-trend.up b{color:#10b981}
.rollup-trend.down b{color:#ef4444}
.rollup-trend.flat b{color:#888}
.rollup-row{display:flex;justify-content:space-between;padding:6px 0;font-size:.72rem;border-top:1px solid var(--border-soft);align-items:center}
.rollup-row:first-of-type{border-top:none}
.rollup-row-lbl{color:#666;font-weight:600;letter-spacing:.3px;font-size:.63rem;text-transform:uppercase;letter-spacing:1.5px}
.rollup-row-val{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums}
.rollup-row-val.strong{color:#10b981}
.rollup-row-val.weak{color:#ef4444}

/* Weakness patterns */
.weak-card{background:linear-gradient(135deg,#1a1830,#14141e);border:1px solid #3a3a6a;border-radius:13px;padding:14px 16px;margin-bottom:14px;position:relative;overflow:hidden;animation:cin .4s ease}
.weak-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#a78bfa}
.weak-title{font-size:.62rem;letter-spacing:2.5px;text-transform:uppercase;color:#a78bfa;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.weak-title::before{content:'';width:6px;height:6px;border-radius:50%;background:#a78bfa}
.weak-list{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.weak-item{font-size:.78rem;color:#d4d4e0;line-height:1.45;padding-left:14px;position:relative;letter-spacing:.2px}
.weak-item::before{content:'→';position:absolute;left:0;color:#7c7ca0;font-weight:800}

/* Sunday Review header */
.sr-stats{background:linear-gradient(135deg,var(--card-alt),var(--card));border:1px solid var(--border-stronger);border-radius:13px;padding:14px 16px;margin-bottom:14px}
.sr-stats::before{}
.sr-stats-hero{display:flex;align-items:baseline;gap:14px;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--border-soft)}
.sr-stats-num{font-size:1.8rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.sr-stats-lbl{font-size:.58rem;color:#666;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.sr-stats-zone{margin-left:auto;font-size:.62rem;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.sr-stat{display:flex;justify-content:space-between;padding:5px 0;font-size:.72rem}
.sr-stat-lbl{color:#666;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-size:.58rem}
.sr-stat-val{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.sr-stat-val.strong{color:#10b981}
.sr-stat-val.weak{color:#ef4444}

/* Slip Triggers */
.trig-card{background:linear-gradient(135deg,#0e0e16,#14141e);border:1px solid var(--border-stronger);border-radius:13px;padding:14px 16px;margin:16px 0;position:relative;overflow:hidden}
.trig-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#7c8cf5}
.trig-title{font-size:.65rem;letter-spacing:2.5px;text-transform:uppercase;color:#7c8cf5;font-weight:800;margin-bottom:4px}
.trig-sub{font-size:.67rem;color:#666;margin-bottom:11px;font-style:italic;line-height:1.4}
.trig-tags{display:flex;flex-wrap:wrap;gap:5px}
.trig-tag{background:var(--card-alt);border:1px solid var(--border-strong);color:#888;padding:6px 11px;border-radius:6px;font-family:inherit;font-size:.68rem;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.trig-tag:hover{color:var(--text-soft);border-color:#3a3a4a}
.trig-tag.on{background:#1a1830;border-color:#7c8cf5;color:#7c8cf5}

/* Y/N buttons on discipline items */
.check-item.yn .chkbox{display:none}
.check-item.yn{padding:10px 14px}
.check-item.yn.nope{border-color:#3a1a1a;background:#140d0d}
.chk-yn{display:flex;gap:4px;margin-left:auto}
.yn-btn{min-width:34px;height:28px;border:1px solid var(--border-strong);background:var(--card-deep);color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;font-size:.72rem;font-weight:800;letter-spacing:.5px;transition:all .15s;padding:0}
.yn-btn.y{border-radius:6px 3px 3px 6px}
.yn-btn.n{border-radius:3px 6px 6px 3px}
.yn-btn:hover{color:var(--text-soft);border-color:#3a3a4a}
.yn-btn.y.on{background:#0f1a0f;border-color:#4CAF50;color:#4CAF50;box-shadow:inset 0 0 0 1px #4CAF50}
.yn-btn.n.on{background:#1a0e0e;border-color:#ef4444;color:#ef4444;box-shadow:inset 0 0 0 1px #ef4444}

/* Weight card (in nutrition) */
.wt-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:14px}
.wt-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.wt-curr{display:flex;align-items:baseline;gap:6px}
.wt-curr-num{font-size:1.7rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.wt-curr-num.empty{color:#444}
.wt-curr-unit{font-size:.7rem;color:#666;font-weight:700}
.wt-delta{font-size:.72rem;font-weight:700;margin-left:8px;font-variant-numeric:tabular-nums}
.wt-delta.up{color:#ef4444}
.wt-delta.down{color:#10b981}
.wt-delta.flat{color:#666}
.wt-stats{display:flex;gap:16px;font-size:.62rem;color:#666;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.wt-stats b{color:var(--text);font-variant-numeric:tabular-nums;font-weight:800;margin-left:4px;font-size:.72rem;text-transform:none;letter-spacing:0}
.wt-chart{background:#0a0a10;border:1px solid var(--border-soft);border-radius:7px;padding:10px 8px;margin-top:12px;overflow:hidden}
.wt-empty{text-align:center;color:#3a3a4a;font-size:.7rem;padding:14px 4px;font-style:italic;line-height:1.5}
.wt-goal-row{margin-top:12px;font-size:.7rem;color:#888;display:flex;justify-content:space-between;align-items:flex-start;padding-top:10px;border-top:1px solid var(--border-soft);gap:10px}
.wt-goal-row b{color:#f5c842;font-weight:800;font-variant-numeric:tabular-nums;margin:0 3px}
.wt-goal-row > div{flex:1;min-width:0}
.wt-goal-pace{font-size:.6rem;color:var(--text-faint);margin-top:5px;letter-spacing:.3px}
.wt-goal-pace b{color:var(--text);font-weight:700;margin:0 2px}
.wt-goal-btn{background:none;border:1px solid var(--border-strong);color:#666;padding:6px 12px;border-radius:6px;font-family:inherit;font-size:.58rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;flex-shrink:0;align-self:flex-start}
.wt-goal-btn:hover{border-color:#3a3a4a;color:#aaa}
.wt-goal-input{background:var(--card-deep);border:1px solid var(--border-strong);color:var(--text);font-family:inherit;font-size:.78rem;padding:7px 9px;border-radius:6px;outline:none;font-variant-numeric:tabular-nums;width:100%}
.wt-goal-input:focus{border-color:#4a4a6a}
.wt-goal-edit{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-soft)}
.wt-goal-edit label{display:block;font-size:.52rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);font-weight:700;margin-bottom:4px}
.wt-goal-edit > div{min-width:0}
.wt-goal-edit button{background:#1a2a1a;border:1px solid #2a4a2a;color:#4CAF50;padding:8px 14px;border-radius:6px;font-family:inherit;font-size:.6rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;height:36px}
html.light-mode .wt-goal-edit button{background:#eaf4ea;color:#0a7f3a;border-color:#b8d4b8}

/* Cloud sync modal + status */
.sb-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
.sb-modal.on{display:flex}
.sb-modal-inner{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.sb-modal-title{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:#7c8cf5;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sb-modal-title::before{content:'';width:6px;height:6px;border-radius:50%;background:#7c8cf5}
.sb-modal-body{font-size:.8rem;line-height:1.5;color:var(--text-soft);margin-bottom:14px}
.sb-modal-body b{color:var(--text)}
.sb-field{margin-bottom:12px}
.sb-field label{display:block;font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);font-weight:700;margin-bottom:5px}
.sb-field input{width:100%;background:var(--card-deep);border:1px solid var(--border-strong);color:var(--text);font-family:inherit;font-size:.86rem;padding:10px 12px;border-radius:7px;outline:none}
.sb-field input:focus{border-color:#7c8cf5}
.sb-modal-btn{background:#1a2030;border:1px solid #4a5a80;color:#7c8cf5;padding:10px 16px;border-radius:8px;font-family:inherit;font-size:.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.sb-modal-btn:hover:not(:disabled){filter:brightness(1.2)}
.sb-modal-btn:disabled{opacity:.5;cursor:not-allowed}
.sb-modal-btn.secondary{background:none;border-color:var(--border-strong);color:var(--text-muted)}
.sb-modal-btn.danger{background:#2a1a1a;border-color:#4a2a2a;color:#ef4444}
html.light-mode .sb-modal-btn{background:#e8ecff;color:#3040a0;border-color:#b8c0e8}
html.light-mode .sb-modal-btn.danger{background:#ffeaea;color:#a02020;border-color:#e8a8a8}
html.light-mode .sb-modal-btn.secondary{background:#fff;color:var(--text-muted);border-color:var(--border-strong)}
.sb-modal-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.sb-status{font-size:.7rem;color:var(--text-muted);margin-bottom:14px;font-weight:600;padding:9px 12px;background:var(--card-deep);border:1px solid var(--border-soft);border-radius:7px;display:flex;align-items:center;gap:8px}
.sb-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-status-dot.synced{background:#10b981}
.sb-status-dot.syncing{background:#f5c842;animation:pulse 1.2s infinite}
.sb-status-dot.offline{background:var(--text-faint)}
.sb-status-dot.error{background:#ef4444}
.sb-warn{background:#2a1a08;border:1px solid #6a4020;color:#e8a870;padding:10px 12px;border-radius:7px;font-size:.72rem;line-height:1.4;margin-bottom:12px}
html.light-mode .sb-warn{background:#fff5e8;border-color:#e8c5a3;color:#6a3a20}

/* Forms discipline card */
.forms-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:14px}
.forms-hdr{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-faint);font-weight:800;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.forms-hdr small{font-size:.55rem;color:var(--text-faint);font-weight:700;letter-spacing:.5px;text-transform:none}
.forms-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.forms-name{flex:0 0 82px;color:var(--text-muted);font-weight:600;font-size:.68rem;letter-spacing:.3px}
.forms-bar{flex:1;height:7px;background:var(--card-deep);border-radius:3px;overflow:hidden;border:1px solid var(--border-soft)}
.forms-fill{height:100%;border-radius:3px;transition:width .4s,background .3s}
.forms-count{flex:0 0 34px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums;font-size:.72rem;letter-spacing:.3px}

/* Per-habit heatmap */
.heat-section{margin-top:20px}
.heat-toggle{width:100%;background:none;border:1px solid var(--border);color:#888;padding:11px 14px;border-radius:11px;font-family:inherit;font-size:.62rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.heat-toggle:hover{border-color:#3a3a4a;color:var(--text-soft)}
.heat-wrap{display:none;padding:14px 12px;background:var(--card-deep);border:1px solid var(--border-soft);border-radius:11px;margin-top:8px}
.heat-wrap.on{display:block}
.heat-row{display:flex;align-items:center;margin-bottom:5px;gap:8px}
.heat-row:last-child{margin-bottom:0}
.heat-label{font-size:.62rem;color:#888;font-weight:600;min-width:72px;max-width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px}
.heat-cells{display:grid;grid-template-columns:repeat(90,1fr);gap:1px;flex:1}
.heat-cell{aspect-ratio:1;background:#1a1a24;border-radius:1px;min-height:5px;max-height:10px}
.heat-cell.hit{background:#10b981}
.heat-cell.miss{background:#3a1a1a}
.heat-cell.today{outline:1.5px solid #f5c842;outline-offset:-1px;z-index:1}
.heat-legend{display:flex;gap:14px;justify-content:flex-end;font-size:.55rem;color:#555;margin-top:10px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.heat-legend span{display:flex;align-items:center;gap:4px}
.heat-legend i{width:9px;height:9px;border-radius:1px;display:inline-block}

/* Recalibrate card */
.recal-card{background:linear-gradient(135deg,#1a0808,#140a0f);border:1px solid #4a1010;border-radius:13px;padding:16px 18px 14px;margin-bottom:14px;position:relative;animation:cin .4s ease}
.recal-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#ef4444,#ff6b35)}
.recal-title{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:#ef4444;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.recal-title::before{content:'';width:7px;height:7px;border-radius:50%;background:#ef4444;animation:pulse 1.6s infinite}
.recal-sub{font-size:.76rem;color:#d0d0d0;margin-bottom:14px;font-weight:500;line-height:1.45}
.recal-q{margin-bottom:11px}
.recal-q-lbl{font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:5px}
.recal-q textarea{width:100%;background:var(--card-deep);border:1px solid #2a1414;border-radius:7px;color:var(--text-soft);font-family:inherit;font-size:.82rem;padding:9px 11px;outline:none;resize:vertical;min-height:42px;transition:border-color .2s;line-height:1.45}
.recal-q textarea:focus{border-color:#6a2a2a}
.recal-q textarea::placeholder{color:#3a1a1a;font-style:italic}
.recal-btn{width:100%;background:linear-gradient(135deg,#ef4444,#ff6b35);border:none;color:#fff;padding:13px;border-radius:9px;font-family:inherit;font-size:.72rem;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:filter .15s}
.recal-btn:hover{filter:brightness(1.1)}
.recal-btn:disabled{background:#2a1a1a;color:#555;cursor:not-allowed;filter:none}

/* PR log card */
.pr-log-card{background:var(--card);border:1px solid var(--border);border-radius:11px;margin-top:14px;overflow:hidden}
.pr-log-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer;transition:background .15s}
.pr-log-hdr:hover{background:var(--card-hover)}
.pr-log-title{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:#f5c842;font-weight:800}
.pr-log-count{font-size:.62rem;color:var(--text-faint);font-weight:700;letter-spacing:.5px}
.pr-log-body{display:none;padding:2px 14px 10px;border-top:1px solid var(--border-soft)}
.pr-log-card.open .pr-log-body{display:block}
.pr-log-row{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:.72rem;border-bottom:1px solid var(--border-soft)}
.pr-log-row:last-child{border-bottom:none}
.pr-log-date{flex:0 0 56px;font-size:.58rem;color:var(--text-faint);font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.pr-log-ex{flex:1;color:var(--text);font-weight:600;font-size:.72rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr-log-delta{font-family:inherit;font-variant-numeric:tabular-nums;font-size:.68rem;color:var(--text-muted);font-weight:700;white-space:nowrap}
.pr-log-delta b{color:#f5c842;font-weight:800;margin-left:2px}
.pr-log-delta small{color:#10b981;font-weight:800;margin-left:4px}
.pr-log-more{text-align:center;font-size:.6rem;color:var(--text-faint);padding:6px;font-style:italic;letter-spacing:.5px}

/* Workout total timer */
.wo-elapsed{display:flex;justify-content:space-between;align-items:center;background:var(--card-deep);border:1px solid var(--border-soft);border-radius:9px;padding:10px 14px;margin-bottom:12px}
.wo-elapsed-lbl{font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);font-weight:800}
.wo-elapsed-time{font-size:1.2rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:1px}
.wo-elapsed-time.running{color:#10b981}
.wo-elapsed-time.long{color:#ff6b35}
.wo-elapsed-btn{background:#1a2a1a;border:1px solid #2a4a2a;color:#4CAF50;padding:7px 14px;border-radius:7px;font-family:inherit;font-size:.62rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.wo-elapsed-btn.stop{background:#2a1a1a;border-color:#4a2a2a;color:#ef4444}
.wo-elapsed-btn:hover{filter:brightness(1.15)}
.wo-timing-group{display:inline-flex;gap:0;margin-right:8px;flex-shrink:0}
.wo-timing-btn{background:var(--card-alt);border:1px solid var(--border-strong);color:var(--text-faint);padding:6px 11px;font-family:inherit;font-size:.58rem;font-weight:800;letter-spacing:1.5px;cursor:pointer;transition:all .15s}
.wo-timing-btn.am{border-radius:6px 0 0 6px;border-right:none}
.wo-timing-btn.pm{border-radius:0 6px 6px 0}
.wo-timing-btn.on{background:#1a2a1a;border-color:#4CAF50;color:#4CAF50}
html.light-mode .wo-timing-btn.on{background:#eaf4ea;color:#0a7f3a;border-color:#b8d4b8}

/* Training load card */
.load-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.load-tag{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;font-weight:800;padding:6px 10px;border-radius:6px;flex-shrink:0}
.load-tag.push{background:#2a1a1a;color:#ef4444;border:1px solid #4a2a2a}
.load-tag.normal{background:#1a2a1a;color:#4CAF50;border:1px solid #2a4a2a}
.load-tag.ease{background:#1a1a30;color:#7c8cf5;border:1px solid #2a2a4a}
html.light-mode .load-tag.push{background:#ffeaea;color:#a02020;border-color:#e8a8a8}
html.light-mode .load-tag.normal{background:#eaf4ea;color:#0a7f3a;border-color:#b8d4b8}
html.light-mode .load-tag.ease{background:#ebeeff;color:#3040a0;border-color:#b8c0e8}
.load-msg{flex:1;font-size:.74rem;color:var(--text-soft);line-height:1.4}

/* Meal editing */
.nut-meal-row.editing{display:grid;grid-template-columns:1fr 58px 58px auto auto;gap:6px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border-soft)}
.nut-meal-row.editing input{background:var(--card-deep);border:1px solid var(--border-strong);color:var(--text);font-family:inherit;font-size:.78rem;padding:7px 9px;border-radius:6px;outline:none;font-variant-numeric:tabular-nums;min-width:0}
.nut-meal-row.editing input.meal-name{text-align:left}
.nut-meal-row.editing input.meal-num{text-align:center}
.nut-meal-row.editing input:focus{border-color:#4a4a6a}
.nut-meal-row.editing button{background:none;border:none;padding:4px 7px;font-size:1rem;cursor:pointer;line-height:1}
.nut-meal-row.editing button.save{color:#10b981}
.nut-meal-row.editing button.cancel{color:var(--text-faint)}

/* Run log card */
.run-card{background:linear-gradient(135deg,var(--card-alt),var(--card));border:1px solid var(--border);border-radius:13px;padding:14px 16px;margin-bottom:14px;position:relative;overflow:hidden}
.run-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#3b82f6,#10b981)}
.run-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.run-title{font-size:.62rem;letter-spacing:2.5px;text-transform:uppercase;color:#3b82f6;font-weight:800}
.run-target{font-size:.62rem;color:var(--text-faint);font-weight:700;letter-spacing:.5px}
.run-target b{color:var(--text);font-variant-numeric:tabular-nums;margin:0 2px}
.run-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.run-input-group{display:flex;flex-direction:column;gap:4px}
.run-input-group label{font-size:.53rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);font-weight:700;text-align:center}
.run-input{background:var(--card-deep);border:1px solid var(--border-strong);color:var(--text);font-family:inherit;font-size:.9rem;padding:9px 10px;border-radius:7px;outline:none;font-variant-numeric:tabular-nums;text-align:center;width:100%}
.run-input:focus{border-color:#3b82f6}
.run-pace-display{font-size:.9rem;color:var(--text-muted);font-variant-numeric:tabular-nums;font-weight:700;padding:9px 0;letter-spacing:.5px;text-align:center}
.run-pace-display b{color:var(--text);font-weight:800}
.run-pace-display.hit b{color:#10b981}
.run-pace-display.slow b{color:#f5c842}
.run-notes{width:100%;background:var(--card-deep);border:1px solid var(--border-strong);color:var(--text);font-family:inherit;font-size:.78rem;padding:8px 10px;border-radius:7px;outline:none;resize:vertical;min-height:44px;margin-top:4px}
.run-notes:focus{border-color:#3b82f6}

/* Weekly mileage card */
.mi-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:14px}
.mi-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.mi-lbl{font-size:.58rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-faint);font-weight:800}
.mi-total{font-size:1.4rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text)}
.mi-total small{font-size:.62rem;color:var(--text-faint);font-weight:700;margin-left:3px}
.mi-days{display:flex;gap:4px}
.mi-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 2px;background:var(--card-deep);border-radius:6px;border:1px solid var(--border-soft)}
.mi-day.today{border-color:#f5c842}
.mi-day-val{font-size:.72rem;color:var(--text-faint);font-weight:700;font-variant-numeric:tabular-nums}
.mi-day-val.done{color:#10b981}
.mi-day-lbl{font-size:.52rem;letter-spacing:.5px;color:var(--text-faint);font-weight:700;text-transform:uppercase}

/* Race Day checklist */
.race-check-card{background:linear-gradient(135deg,#1a0e08,#14141e);border:1px solid #5a3a1a;border-radius:13px;padding:14px 16px;margin-bottom:14px;position:relative;overflow:hidden}
.race-check-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#f5c842,#ef4444)}
html.light-mode .race-check-card{background:linear-gradient(135deg,#fff5e8,#fff);border-color:#e8c5a3}
.race-check-title{font-size:.62rem;letter-spacing:2.5px;text-transform:uppercase;color:#f5c842;font-weight:800;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.race-check-title small{font-size:.55rem;color:var(--text-faint);letter-spacing:1px;font-weight:700;text-transform:none}
.race-check-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-soft);cursor:pointer;user-select:none;-webkit-user-select:none;transition:padding-left .15s}
.race-check-item:hover{padding-left:4px}
.race-check-item:last-child{border-bottom:none}
.race-check-box{width:18px;height:18px;border-radius:4px;border:2px solid var(--border-strong);margin-right:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.race-check-item.done .race-check-box{background:#10b981;border-color:#10b981}
.race-check-box svg{width:10px;height:10px;opacity:0}
.race-check-item.done .race-check-box svg{opacity:1}
.race-check-lbl{font-size:.82rem;color:var(--text-soft);flex:1;transition:all .2s}
.race-check-item.done .race-check-lbl{color:var(--text-faint);text-decoration:line-through}

/* Three Whys */
.whys-card{background:linear-gradient(135deg,var(--card-alt),var(--card));border:1px solid var(--border);border-radius:13px;padding:14px 16px;margin-bottom:14px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .2s}
.whys-card:hover{border-color:var(--border-strong)}
.whys-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#7c8cf5,#ef4444,#f5c842)}
.whys-title{font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:#f5c842;font-weight:800;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.whys-title small{font-size:.52rem;color:var(--text-faint);letter-spacing:1.5px;font-weight:700}
.why-row{padding:9px 0;border-bottom:1px solid var(--border-soft)}
.why-row:last-child{border-bottom:none}
.why-row-lbl{font-size:.54rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);font-weight:800;margin-bottom:4px}
.why-row-lbl.identity{color:#7c8cf5}
.why-row-lbl.pain{color:#ef4444}
.why-row-lbl.future{color:#f5c842}
.why-row-text{font-family:'Fraunces',Georgia,serif;font-size:.92rem;color:var(--text-soft);font-style:italic;line-height:1.45;letter-spacing:.2px}

/* Richmond Marathon card */
.race-card{background:linear-gradient(135deg,#1a0e0e,#14141e);border:1px solid #3a1a18;border-radius:13px;padding:14px 16px;margin-bottom:14px;position:relative;overflow:hidden}
.race-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#ef4444,#f5c842)}
.race-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.race-title{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:#f5c842;font-weight:800;display:flex;align-items:center;gap:7px}
.race-title::before{content:'';width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pulse 2s infinite}
.race-date{font-size:.58rem;color:var(--text-faint);font-weight:700;letter-spacing:1px}
.race-big{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.race-days{font-size:2.2rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;color:#ef4444}
.race-unit{font-size:.72rem;color:var(--text-muted);font-weight:700}
.race-remain{margin-left:auto;font-size:.62rem;color:var(--text-faint);font-weight:700;letter-spacing:.5px;text-align:right}
.race-bar{height:6px;background:var(--card-deep);border-radius:3px;overflow:hidden;margin-bottom:10px;border:1px solid var(--border-soft)}
.race-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f5c842);border-radius:3px;transition:width .6s}
.race-quote{font-family:'Fraunces',Georgia,serif;font-size:.82rem;color:var(--text-soft);font-style:italic;line-height:1.5;padding-top:10px;border-top:1px solid var(--border-soft);margin-top:2px;letter-spacing:.2px}
.race-quote b{color:#f5c842;font-weight:600;font-style:normal}
html.light-mode .race-card{background:linear-gradient(135deg,#ffeaea,#fff);border-color:#e8b8b8}
html.light-mode .race-quote{color:#2a1f10}
html.light-mode .race-quote b{color:#a87700}

/* Vision card + reader */
.vision-card{background:linear-gradient(135deg,#1a0e08,#14141e);border:1px solid #3a1a10;border-radius:13px;padding:14px 18px;margin-bottom:14px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .2s,background .25s}
.vision-card:hover{border-color:#6a3a20}
.vision-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#ff6b35,#f5c842)}
.vision-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.vision-label{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:#f5c842;font-weight:800;display:flex;align-items:center;gap:6px}
.vision-label::before{content:'';width:5px;height:5px;border-radius:50%;background:#f5c842}
.vision-read{font-size:.58rem;color:#d4a060;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.vision-preview{font-family:'Fraunces',Georgia,serif;font-size:.88rem;line-height:1.45;color:#e8d4c8;font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
html.light-mode .vision-card{background:linear-gradient(135deg,#fff5e8,#fff);border-color:#e8c5a3}
html.light-mode .vision-card:hover{border-color:#d0a070}
html.light-mode .vision-preview{color:#5a3520}
.vision-reader{position:fixed;inset:0;background:radial-gradient(ellipse at top,#1a0e08,#05050a 70%);z-index:200;display:none;padding:34px 22px 32px;animation:fadeIn .3s ease;overflow-y:auto}
.vision-reader.on{display:block}
.vision-reader-top{display:flex;justify-content:space-between;align-items:center;margin:0 auto 26px;max-width:640px}
.vision-reader-title{font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:#f5c842;font-weight:800}
.vision-reader-actions{display:flex;gap:6px;align-items:center}
.vision-reader-btn{background:none;border:1px solid #3a2a18;color:#b09080;padding:7px 12px;border-radius:6px;font-family:inherit;font-size:.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.vision-reader-btn:hover{border-color:#6a4a2a;color:#e8d0b8}
.vision-reader-btn.close{border:none;color:#666;font-size:1.5rem;padding:2px 10px;line-height:1}
.vision-reader-btn.close:hover{color:#e8d0b8}
.vision-reader-body{font-family:'Fraunces',Georgia,serif;font-size:1.08rem;line-height:1.7;color:#ece4d4;max-width:640px;margin:0 auto;white-space:pre-wrap;word-break:break-word;letter-spacing:.2px;outline:none;padding-bottom:40px}
.vision-reader-body[contenteditable=true]{background:rgba(245,200,66,.03);padding:14px;border-radius:10px}
html.light-mode .vision-reader{background:radial-gradient(ellipse at top,#fff5e8,#f0ebe0 70%)}
html.light-mode .vision-reader-body{color:#2a1f10}
html.light-mode .vision-reader-btn{color:#6a4a2a;border-color:#c8a080}
html.light-mode .vision-reader-btn:hover{color:#3a1f10;border-color:#8a5a3a}
html.light-mode .vision-reader-btn.close{color:#8a8a95;border:none}

/* Caffeine tracker */
.caf-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:14px}
.caf-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.caf-title{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-faint);font-weight:800}
.caf-total{font-size:1.4rem;font-weight:800;font-variant-numeric:tabular-nums}
.caf-total small{font-size:.6rem;color:var(--text-faint);font-weight:700;margin-left:3px}
.caf-bar{height:7px;background:var(--card-deep);border-radius:3px;overflow:hidden;margin-bottom:10px;border:1px solid var(--border-soft)}
.caf-fill{height:100%;border-radius:3px;transition:width .4s,background .3s}
.caf-presets{display:flex;flex-wrap:wrap;gap:5px}
.caf-preset{background:var(--card-alt);border:1px solid var(--border-strong);color:var(--text-muted);padding:7px 11px;border-radius:7px;font-family:inherit;font-size:.68rem;font-weight:700;cursor:pointer;transition:all .15s}
.caf-preset:hover{color:var(--text);border-color:#8b5cf6;background:var(--card)}
.caf-preset small{color:var(--text-faint);font-weight:700;margin-left:4px;font-variant-numeric:tabular-nums;font-size:.58rem}
.caf-reset{background:none;border:1px dashed var(--border-strong);color:var(--text-faint);padding:6px 12px;border-radius:6px;font-family:inherit;font-size:.58rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;margin-top:8px;display:inline-block}
.caf-reset:hover{color:#ef4444;border-color:#ef4444}

/* Intermittent Fasting */
.if-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:14px}
.if-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.if-title{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-faint);font-weight:800}
.if-streak{font-size:.66rem;color:var(--text-muted);font-weight:700;letter-spacing:.5px}
.if-streak b{color:#f5c842;font-weight:800;font-variant-numeric:tabular-nums}
.if-time{display:flex;align-items:baseline;gap:6px;margin-bottom:8px}
.if-num{font-size:1.9rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.if-unit{font-size:.72rem;color:var(--text-muted);font-weight:700}
.if-status{margin-left:auto;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;font-weight:800}
.if-status.fasting{color:#f5c842}
.if-status.hit{color:#10b981}
.if-status.fed{color:var(--text-faint)}
.if-bar{height:6px;background:var(--border-soft);border-radius:3px;overflow:hidden;margin-bottom:10px}
.if-fill{height:100%;border-radius:3px;transition:width .4s,background .3s}
.if-targets{display:flex;gap:6px;margin-bottom:10px}
.if-target{flex:1;background:var(--card-alt);border:1px solid var(--border-strong);color:var(--text-muted);padding:7px;border-radius:6px;font-family:inherit;font-size:.68rem;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.5px;text-align:center}
.if-target:hover{color:var(--text-soft)}
.if-target.on{background:#1a2a1a;border-color:#4CAF50;color:#4CAF50}
html.light-mode .if-target.on{background:#eaf4ea;color:#0a7f3a;border-color:#b8d4b8}
.if-btn{width:100%;background:#1a2a1a;border:1px solid #2a4a2a;color:#4CAF50;padding:11px;border-radius:8px;font-family:inherit;font-size:.72rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.if-btn:hover{filter:brightness(1.15)}
.if-btn.break{background:var(--card-alt);border-color:var(--border-strong);color:var(--text-muted)}
html.light-mode .if-btn{background:#eaf4ea;color:#0a7f3a;border-color:#b8d4b8}

/* PR celebration */
.pr-flash{position:fixed;inset:0;background:radial-gradient(circle at center,rgba(245,200,66,.35) 0%,rgba(245,200,66,0) 60%);pointer-events:none;z-index:300;opacity:0;animation:prflash 1.4s ease}
@keyframes prflash{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
.pr-toast{position:fixed;top:25%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#f5c842,#ff6b35);color:#0a0a0f;padding:18px 30px;border-radius:14px;font-family:inherit;font-weight:800;font-size:1.05rem;letter-spacing:2.5px;text-transform:uppercase;z-index:301;box-shadow:0 10px 40px rgba(245,200,66,.5);animation:prtoast 1.8s ease;pointer-events:none;text-align:center;line-height:1.2}
.pr-toast small{display:block;font-size:.6rem;letter-spacing:1.5px;margin-top:3px;font-weight:700}
@keyframes prtoast{0%{opacity:0;transform:translate(-50%,-30%) scale(.7)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}30%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-55%) scale(1)}}

/* BMR calc rows */
.bmr-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft)}
.bmr-section .nut-editor-field select{background:var(--card-deep);border:1px solid var(--border-strong);color:var(--text);font-family:inherit;font-size:.8rem;padding:8px 10px;border-radius:6px;outline:none}
html.light-mode .bmr-section .nut-editor-field select{background:#fff;color:var(--text)}
.bmr-calc-btn{background:#1a1608;border:1px solid #f5c842;color:#f5c842}
html.light-mode .bmr-calc-btn{background:#fff7e0;color:#a87700;border-color:#e8c890}

/* Copy yesterday button */
.copy-yday-btn{background:var(--card-deep);border:1px dashed var(--border-strong);color:var(--text-muted);padding:11px;border-radius:9px;font-family:inherit;font-size:.72rem;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s;margin-bottom:14px;width:100%;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.copy-yday-btn:hover{border-style:solid;border-color:#10b981;color:#10b981;background:var(--card)}
.copy-yday-btn b{color:var(--text);font-weight:800;font-variant-numeric:tabular-nums}

/* Calorie distribution */
.cal-dist-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:14px}
.cal-dist-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-dist-lbl{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-faint);font-weight:800}
.cal-dist-days{font-size:.58rem;color:var(--text-faint);font-weight:700;letter-spacing:.5px}
.cal-dist-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:.7rem}
.cal-dist-range{flex:0 0 100px;color:var(--text-muted);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.3px;font-size:.66rem}
.cal-dist-bar{flex:1;height:10px;background:var(--card-deep);border-radius:3px;overflow:hidden;border:1px solid var(--border-soft)}
.cal-dist-fill{height:100%;border-radius:3px;transition:width .5s}
.cal-dist-count{flex:0 0 30px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text);font-size:.75rem}

/* Weekly macro trend */
.nut-weekly{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 16px;margin-bottom:14px}
.nut-weekly-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.nut-weekly-lbl{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-faint);font-weight:800}
.nut-weekly-days{font-size:.58rem;color:var(--text-faint);font-weight:700;letter-spacing:.5px}
.nut-weekly-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-top:1px solid var(--border-soft)}
.nut-weekly-row-lbl{font-size:.58rem;color:var(--text-faint);font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.nut-weekly-row-val{font-variant-numeric:tabular-nums}
.nut-weekly-row-val b{color:var(--text);font-weight:800;font-size:.9rem}
.nut-weekly-row-val small{color:var(--text-faint);font-weight:700;font-size:.66rem;margin-left:6px}
.nut-weekly-row-val small.hit{color:#10b981}

/* 100-day edit */
.d100-edit-btn{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:.85rem;padding:0 4px;line-height:1;margin-left:4px}
.d100-edit-btn:hover{color:var(--text)}

/* Nutrition page */
.nut-ring{position:relative;width:150px;height:150px;margin:4px auto 8px}
.nut-ring svg{transform:rotate(-90deg)}
.nut-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.nut-cal{font-size:2.2rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.nut-target-line{font-size:.62rem;color:#666;margin-top:4px;letter-spacing:.5px;font-weight:600}
.nut-remaining{text-align:center;font-size:.68rem;color:#888;margin-bottom:14px;letter-spacing:1px;font-weight:600}
.nut-remaining b{color:#f5c842;font-size:.9rem;font-weight:800;font-variant-numeric:tabular-nums}
.nut-remaining.over b{color:#ef4444}
.nut-macros{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:14px}
.nut-mac-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-soft)}
.nut-mac-row:last-child{border-bottom:none}
.nut-mac-lbl{flex:0 0 62px;font-size:.6rem;color:#888;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.nut-mac-bar{flex:1;height:6px;background:#1a1a24;border-radius:3px;overflow:hidden}
.nut-mac-fill{height:100%;border-radius:3px;transition:width .4s,background .3s}
.nut-mac-vals{flex:0 0 82px;text-align:right;font-size:.7rem;color:#666;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.3px}
.nut-mac-vals b{color:var(--text)}
.nut-score-card{background:linear-gradient(135deg,var(--card-alt),var(--card));border:1px solid var(--border-stronger);border-radius:11px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.nut-score-lbl{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:#666;font-weight:800}
.nut-score-val{font-size:1.55rem;font-weight:800;font-variant-numeric:tabular-nums}
.nut-score-val small{font-size:.68rem;color:#555;font-weight:700}
.nut-section-lbl{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:#555;font-weight:800;margin:16px 0 8px}
.nut-presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.nut-preset{background:var(--card-alt);border:1px solid var(--border-strong);color:var(--text-soft);padding:8px 12px;border-radius:8px;font-family:inherit;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:1px;text-align:left;min-width:0}
.nut-preset:hover{border-color:#4a6a4a;background:#15201a;color:#fff}
.nut-preset-name{font-weight:700;letter-spacing:.2px;font-size:.75rem}
.nut-preset-sub{font-size:.58rem;color:#666;font-weight:700;letter-spacing:.5px}
.nut-preset:hover .nut-preset-sub{color:#888}
.nut-add{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px;margin-bottom:14px;display:grid;grid-template-columns:1fr 66px 66px auto;gap:6px;align-items:center}
.nut-add input{background:var(--card-deep);border:1px solid #1a1a2a;border-radius:7px;color:var(--text-soft);font-family:inherit;font-size:.8rem;padding:9px 10px;outline:none;transition:border-color .2s;min-width:0;font-variant-numeric:tabular-nums}
.nut-add input:focus{border-color:#4a4a6a}
.nut-add input::placeholder{color:#2a2a3a}
.nut-add button{background:#1a2a1a;border:1px solid #2a4a2a;color:#4CAF50;padding:9px 14px;border-radius:7px;font-family:inherit;font-size:1.1rem;font-weight:800;cursor:pointer;transition:all .15s;line-height:1}
.nut-add button:hover{filter:brightness(1.15)}
.nut-meals{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:8px 14px 10px;margin-bottom:14px}
.nut-meals-hdr{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:#666;font-weight:700;padding:6px 0}
.nut-meal-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-soft)}
.nut-meal-row:last-child{border-bottom:none}
.nut-meal-time{flex:0 0 52px;font-size:.62rem;color:#555;font-weight:700;letter-spacing:.5px;font-variant-numeric:tabular-nums}
.nut-meal-name{flex:1;font-size:.82rem;color:var(--text-soft);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nut-meal-stats{font-size:.7rem;color:#888;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.3px;margin-right:2px;white-space:nowrap}
.nut-meal-del{background:none;border:none;color:#555;cursor:pointer;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;line-height:1}
.nut-meal-del:hover{color:#ef4444;background:rgba(239,68,68,.1)}
.nut-meal-empty{text-align:center;color:#3a3a4a;font-size:.72rem;padding:14px 4px;font-style:italic}
.nut-actions{display:flex;gap:8px;margin-top:6px}
.nut-action-btn{flex:1;background:none;border:1px solid var(--border-strong);color:#666;padding:10px;border-radius:8px;font-family:inherit;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.nut-action-btn:hover{border-color:#3a3a4a;color:var(--text-soft)}
.nut-editor{background:var(--card);border:1px solid var(--border-stronger);border-radius:11px;padding:14px;margin-top:10px}
.nut-editor-title{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:#aaa;font-weight:800;margin-bottom:10px}
.nut-editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.nut-editor-field{display:flex;flex-direction:column;gap:4px}
.nut-editor-field label{font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;color:#666;font-weight:700}
.nut-editor-field input{background:var(--card-deep);border:1px solid #1a1a2a;border-radius:6px;color:var(--text);font-family:inherit;font-size:.82rem;padding:8px 10px;outline:none;font-variant-numeric:tabular-nums}
.nut-editor-field input:focus{border-color:#4a4a6a}
.nut-preset-item{display:flex;gap:6px;padding:6px 0;border-bottom:1px solid var(--border-soft);align-items:center}
.nut-preset-item:last-child{border-bottom:none}
.nut-preset-item input{background:var(--card-deep);border:1px solid #1a1a2a;border-radius:6px;color:var(--text-soft);font-family:inherit;font-size:.76rem;padding:7px 9px;outline:none;min-width:0;font-variant-numeric:tabular-nums}
.nut-preset-item input:focus{border-color:#4a4a6a}
.nut-preset-item input.pn{flex:1}
.nut-preset-item input.ps{flex:0 0 56px;text-align:center}
.nut-preset-item button{background:none;border:none;color:#555;cursor:pointer;padding:4px 8px;font-size:1.1rem;line-height:1}
.nut-preset-item button:hover{color:#ef4444}
.nut-preset-item button.add{color:#4CAF50}
.nut-preset-item button.add:hover{color:#6bdb6b}

/* Focus mode */
.focus-fab{position:fixed;right:18px;bottom:74px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#f5c842,#ff6b35);border:none;color:#0a0a0f;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(245,200,66,.3),0 2px 8px rgba(0,0,0,.4);z-index:99;transition:transform .15s,box-shadow .15s}
.focus-fab:hover{transform:scale(1.08);box-shadow:0 8px 26px rgba(245,200,66,.4),0 2px 8px rgba(0,0,0,.4)}
.focus-fab:active{transform:scale(.96)}
.focus-fab svg{width:22px;height:22px;stroke-width:2.5}
.focus-mode{position:fixed;inset:0;background:radial-gradient(ellipse at top,#0e0e16,#05050a 80%);z-index:200;display:none;flex-direction:column;padding:36px 26px 32px;animation:fadeIn .25s ease;overflow-y:auto}
.focus-mode.on{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.focus-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.focus-title{font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:#f5c842;font-weight:800;display:flex;align-items:center;gap:8px}
.focus-title::before{content:'';width:7px;height:7px;border-radius:50%;background:#f5c842;animation:pulse 1.8s infinite}
.focus-x{background:none;border:none;color:#555;font-size:1.8rem;cursor:pointer;padding:0 8px;line-height:1}
.focus-x:hover{color:var(--text-soft)}
.focus-task-lbl{font-size:.58rem;letter-spacing:2.5px;text-transform:uppercase;color:#555;font-weight:700;margin-bottom:10px;text-align:center}
.focus-task{font-family:'Fraunces',Georgia,serif;font-size:1.4rem;line-height:1.4;color:#ece7d8;text-align:center;margin:0 auto 28px;padding:0 10px;min-height:70px;max-width:460px;outline:none;font-weight:400}
.focus-task:empty::before{content:'What are you locked in on?';color:#3a3a4a;font-style:italic}
.focus-time{font-size:5.5rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px;color:#888;line-height:1;transition:color .2s;text-align:center;margin:4px 0 24px}
.focus-time.running{color:#10b981}
.focus-time.warn{color:#f5c842}
.focus-time.done{color:#ef4444;animation:flashRed 1s infinite}
.focus-presets{display:flex;gap:8px;margin-bottom:18px;justify-content:center;flex-wrap:wrap}
.focus-preset{background:var(--card-alt);border:1px solid var(--border-strong);color:#888;padding:9px 16px;border-radius:8px;font-family:inherit;font-size:.72rem;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all .15s}
.focus-preset:hover{color:var(--text-soft);border-color:#3a3a4a}
.focus-preset.active{background:#1a2a1a;border-color:#4CAF50;color:#4CAF50}
.focus-ctrls{display:flex;gap:10px;max-width:340px;margin:0 auto;width:100%}
.focus-ctrl{flex:1;background:#1a2a1a;border:1px solid #2a4a2a;color:#4CAF50;padding:14px;border-radius:10px;font-family:inherit;font-size:.78rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.focus-ctrl.sec{background:var(--card-alt);border-color:#252535;color:#888}
.focus-ctrl:hover{filter:brightness(1.15)}
.focus-quote{text-align:center;font-family:'Fraunces',Georgia,serif;font-size:.85rem;color:#555;font-style:italic;margin-top:auto;padding-top:30px;line-height:1.4}

/* 100-Day Mission */
.d100-card{background:linear-gradient(135deg,var(--card-alt),var(--card));border:1px solid var(--border-stronger);border-radius:13px;padding:14px 16px;margin-bottom:14px;position:relative;overflow:hidden}
.d100-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#7c8cf5,#f5c842)}
.d100-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.d100-title{font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:#7c8cf5;font-weight:800}
.d100-status{font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;color:#666;font-weight:700}
.d100-big{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
.d100-day{font-size:1.6rem;font-weight:800;color:#f5c842;font-variant-numeric:tabular-nums;line-height:1}
.d100-of{font-size:.78rem;color:#555;font-weight:600}
.d100-remain{margin-left:auto;font-size:.72rem;color:#888;font-weight:600;font-variant-numeric:tabular-nums}
.d100-bar{height:6px;background:var(--card-deep);border-radius:3px;overflow:hidden;margin-bottom:8px;position:relative}
.d100-fill{height:100%;background:linear-gradient(90deg,#7c8cf5,#f5c842);border-radius:3px;transition:width .6s ease}
.d100-meta{display:flex;justify-content:space-between;font-size:.6rem;color:#555;letter-spacing:.5px}
.d100-meta b{color:#aaa;font-weight:700}
.d100-pre{text-align:center;padding:6px 0;font-size:.75rem;color:#aaa;font-weight:600;letter-spacing:.5px}
.d100-pre b{color:#f5c842}
.d100-timeline{display:grid;grid-template-columns:repeat(100,1fr);gap:1px;margin-top:12px;height:18px;background:#0a0a0f;border-radius:4px;padding:2px;border:1px solid var(--border-soft)}
.d100-tile{background:#1a1a24;border-radius:1px;cursor:pointer;transition:transform .15s,filter .15s,outline .15s}
.d100-tile:hover{transform:scaleY(1.5);filter:brightness(1.3);z-index:1}
.d100-tile.today{outline:2px solid #fff;outline-offset:-1px;z-index:2;background:#f5c842}
.d100-tile.future{background:transparent}
.d100-tile.missed{background:#2a1418}

/* Top 3 Priorities */
.pri-card{background:linear-gradient(135deg,var(--card-alt),var(--card));border:1px solid var(--border-stronger);border-radius:13px;padding:14px 16px;margin-bottom:16px;position:relative;overflow:hidden}
.pri-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#f5c842,#ff6b35)}
.pri-title{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:#f5c842;font-weight:800;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.pri-count{font-size:.65rem;color:#666;font-weight:600;letter-spacing:1px}
.pri-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-soft)}
.pri-row:last-child{border-bottom:none}
.pri-num{font-size:.78rem;font-weight:800;color:#555;min-width:18px;text-align:center}
.pri-input{flex:1;background:none;border:none;color:var(--text-soft);font-family:inherit;font-size:.87rem;outline:none;padding:4px 0;font-weight:500;transition:color .2s}
.pri-input:focus{color:#fff}
.pri-input::placeholder{color:#2a2a3a;font-style:italic}
.pri-input.done{text-decoration:line-through;text-decoration-color:#555;color:#555}
.pri-chk{width:22px;height:22px;border-radius:6px;border:2px solid #3a3a4a;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pri-chk.done{background:#f5c842;border-color:#f5c842}
.pri-chk svg{width:12px;height:12px;opacity:0}
.pri-chk.done svg{opacity:1}
.pri-empty-hint{font-size:.65rem;color:#3a3a4a;text-align:center;margin-top:8px;font-style:italic}

/* Kept My Word */
.kw-card{background:linear-gradient(135deg,var(--card-alt),var(--card));border:1px solid var(--border-stronger);border-radius:13px;padding:14px 16px;margin:16px 0}
.kw-title{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-soft);font-weight:800;margin-bottom:3px}
.kw-sub{font-size:.67rem;color:#555;margin-bottom:10px;font-style:italic;line-height:1.4}
.kw-btns{display:flex;gap:8px;margin-bottom:10px}
.kw-btn{flex:1;background:var(--card-alt);border:1px solid var(--border-strong);color:#666;padding:10px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:2px;transition:all .2s;text-transform:uppercase}
.kw-btn:hover{color:#aaa;border-color:#3a3a4a}
.kw-btn.yes.sel{background:#0f1a0f;border-color:#4CAF50;color:#4CAF50;box-shadow:inset 0 0 0 1px #4CAF50}
.kw-btn.no.sel{background:#1a0f0f;border-color:#ef4444;color:#ef4444;box-shadow:inset 0 0 0 1px #ef4444}
.kw-note{width:100%;background:var(--card-deep);border:1px solid #1a1a2a;border-radius:7px;color:var(--text-soft);font-family:inherit;font-size:.8rem;padding:9px 11px;outline:none;resize:none;min-height:40px;transition:border-color .2s;line-height:1.5}
.kw-note:focus{border-color:#4a4a6a}
.kw-note::placeholder{color:#2a2a3a}

/* Metrics card (sleep + weight) */
.met-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:4px 14px;margin-bottom:16px}
.met-row{display:flex;align-items:center;gap:14px;padding:12px 2px;border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background .15s}
.met-row:last-child{border-bottom:none}
.met-row:hover{background:rgba(255,255,255,.015)}
.met-lbl{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:#666;font-weight:700;min-width:56px}
.met-main{display:flex;align-items:baseline;gap:6px}
.met-num{font-size:1.45rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;color:var(--text)}
.met-num.low{color:#555}
.met-unit{font-size:.7rem;color:#666;font-weight:600}
.met-sub{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:.68rem;color:#666;font-weight:600;font-variant-numeric:tabular-nums}
.met-delta.up{color:#ef4444}
.met-delta.down{color:#10b981}
.met-delta.flat{color:#666}
.met-spark{display:flex;align-items:flex-end;gap:2px;height:20px;margin-left:8px}
.met-spark-bar{width:3px;background:#3a3a4a;border-radius:1px;min-height:2px}
.met-spark-bar.today{background:#f5c842}
.met-edit{display:none;padding:10px 2px 14px;border-top:1px solid var(--border-soft)}
.met-row.open + .met-edit{display:block}
.met-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.met-edit-field{display:flex;flex-direction:column;gap:4px}
.met-edit-field.full{grid-column:1/-1}
.met-edit-field label{font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;color:#666;font-weight:700}
.met-edit-field input{background:var(--card-deep);border:1px solid #1a1a2a;border-radius:7px;color:var(--text);font-family:inherit;font-size:.88rem;padding:9px 11px;outline:none;transition:border-color .2s;font-variant-numeric:tabular-nums}
.met-edit-field input:focus{border-color:#4a4a6a}
.met-edit-field input::placeholder{color:#2a2a3a}

/* Special event day toggle (waives alcohol penalty) */
.tox-se-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin:0 0 10px;background:var(--card-deep);border:1px dashed var(--border-strong);border-radius:8px;font-size:.66rem;gap:8px;flex-wrap:wrap}
.tox-se-lbl{color:var(--text-muted);font-weight:600;letter-spacing:.3px;flex:1;min-width:0}
.tox-se-lbl b{color:#f5c842;font-weight:800;font-variant-numeric:tabular-nums;margin:0 2px}
.tox-se-lbl small{display:block;font-size:.56rem;color:var(--text-faint);margin-top:2px;letter-spacing:.3px}
.tox-se-btn{background:none;border:1px solid var(--border-strong);color:var(--text-faint);padding:6px 12px;border-radius:6px;font-family:inherit;font-size:.58rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;flex-shrink:0}
.tox-se-btn:hover{color:var(--text-soft);border-color:var(--border-stronger)}
.tox-se-btn.on{background:#1a1608;border-color:#f5c842;color:#f5c842}
html.light-mode .tox-se-btn.on{background:#fff7e0;color:#a87700;border-color:#e8c890}
.tox-item.waived{opacity:.5}
.tox-item.waived .tox-pts{text-decoration:line-through}

/* Toxic actions (negative scoring) */
.tox-card{background:linear-gradient(135deg,#1a0e0e,#140e12);border:1px solid #2a1818;border-radius:13px;padding:14px 16px;margin:16px 0;position:relative;overflow:hidden}
.tox-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#ef4444}
.tox-title{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:#ef4444;font-weight:800;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.tox-pen{font-size:.65rem;color:#888;font-weight:700;letter-spacing:.5px}
.tox-sub{font-size:.66rem;color:#6a4a4a;margin-bottom:10px;font-style:italic;line-height:1.4}
.tox-list{display:flex;flex-direction:column;gap:5px}
.tox-item{display:flex;align-items:center;padding:9px 11px;background:#160d10;border:1px solid #241418;border-radius:9px;cursor:pointer;transition:all .2s;user-select:none;-webkit-user-select:none}
.tox-item:hover{background:#1f1014;border-color:#3a1a20}
.tox-item.on{background:#260e14;border-color:#5a1a1a}
.tox-chk{width:18px;height:18px;border-radius:5px;border:2px solid #3a2a2e;margin-right:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tox-item.on .tox-chk{background:#ef4444;border-color:#ef4444}
.tox-chk svg{width:11px;height:11px;opacity:0}
.tox-item.on .tox-chk svg{opacity:1}
.tox-lbl{flex:1;font-size:.82rem;font-weight:500;color:var(--text-soft)}
.tox-item.on .tox-lbl{color:#ef8888}
.tox-pts{font-size:.68rem;color:#5a3a3a;font-weight:700;letter-spacing:.5px;font-variant-numeric:tabular-nums}
.tox-item.on .tox-pts{color:#ef4444}

/* Countdown rest timer */
.wo-timer-new{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.wo-timer-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.wo-timer-label{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:#666;font-weight:700}
.wo-timer-big{font-size:2rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px;color:#aaa;transition:color .2s}
.wo-timer-big.running{color:#4CAF50}
.wo-timer-big.warn{color:#f5c842}
.wo-timer-big.done{color:#ef4444;animation:flashRed 1s infinite}
@keyframes flashRed{0%,100%{opacity:1}50%{opacity:.4}}
.wo-timer-presets{display:flex;gap:6px}
.wo-timer-preset{flex:1;background:var(--card-alt);border:1px solid var(--border-strong);color:#888;padding:8px 0;border-radius:7px;font-family:inherit;font-size:.72rem;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s}
.wo-timer-preset:hover{background:#1e1e2e;color:var(--text-soft)}
.wo-timer-preset.active{background:#1a2a1a;border-color:#4CAF50;color:#4CAF50}
.wo-timer-ctrls{display:flex;gap:6px}
.wo-timer-ctrl{flex:1;background:#1a1a24;border:1px solid var(--border-strong);color:#888;padding:9px 0;border-radius:7px;font-family:inherit;font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.wo-timer-ctrl.go{background:#1a2a1a;border-color:#2a4a2a;color:#4CAF50}
.wo-timer-ctrl.go:hover{background:#2a4a2a}
.wo-timer-ctrl:hover{background:#252535;color:var(--text-soft)}

/* Settings / export-import */
.settings-row{display:flex;justify-content:center;gap:10px;margin-top:24px;padding:18px 0;border-top:1px solid var(--border-soft);flex-wrap:wrap}
.settings-btn{background:none;border:1px solid var(--border-strong);color:#555;padding:8px 16px;border-radius:7px;font-family:inherit;font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.settings-btn:hover{border-color:#3a3a4a;color:#aaa}

/* Custom habit add */
.custom-add{background:none;border:1px dashed #252535;color:#555;padding:10px;border-radius:10px;width:100%;margin-top:6px;font-family:inherit;font-size:.75rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.custom-add:hover{border-color:#3a3a4a;color:#aaa;border-style:solid}
.custom-edit{display:flex;gap:8px;padding:10px;background:var(--card);border:1px solid var(--border-stronger);border-radius:10px;margin-top:6px}
.custom-edit input{flex:1;background:var(--card-deep);border:1px solid #1a1a2a;border-radius:7px;color:var(--text-soft);font-family:inherit;font-size:.82rem;padding:8px 10px;outline:none}
.custom-edit input:focus{border-color:#4a4a6a}
.custom-edit button{background:#1a2a1a;border:1px solid #2a4a2a;color:#4CAF50;padding:0 12px;border-radius:7px;font-family:inherit;font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.custom-edit button.cancel{background:#1a1a24;border-color:#252535;color:#888}
.check-item .chk-delete{opacity:0;width:22px;height:22px;border-radius:50%;background:none;border:none;color:#555;cursor:pointer;font-size:1rem;margin-left:6px;transition:opacity .2s}
.check-item:hover .chk-delete{opacity:1}
.check-item .chk-delete:hover{color:#ef4444}

/* Water pills */
.water-pills{display:flex;gap:3px;margin-left:auto;margin-right:8px}
.water-pill{width:9px;height:19px;background:#141820;border:1px solid #1e2530;border-radius:2px;cursor:pointer;transition:all .15s}
.water-pill:hover{border-color:#3a5070}
.water-pill.on{background:linear-gradient(180deg,#3b82f6,#1e5cc8);border-color:#3b82f6}
.water-pill.full{background:linear-gradient(180deg,#10b981,#0a8a62);border-color:#10b981;box-shadow:0 0 6px rgba(16,185,129,.3)}
.water-oz{font-size:.65rem;color:#666;font-weight:700;min-width:44px;text-align:right;font-variant-numeric:tabular-nums;letter-spacing:.3px}
.water-oz.full{color:#10b981}

/* Tier pills (steps) */
.tier-pills{display:flex;gap:5px;margin-left:auto}
.tier-pill{background:var(--card-alt);border:1px solid var(--border-strong);color:#666;padding:5px 10px;border-radius:6px;font-family:inherit;font-size:.66rem;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s;min-width:34px;text-align:center}
.tier-pill:hover{color:var(--text-soft);border-color:#3a3a4a}
.tier-pill.on{background:#0f1a0f;border-color:#4CAF50;color:#4CAF50}
.tier-pill.on.gold{background:#1a1608;border-color:#f5c842;color:#f5c842}
.tier-pill.fail:hover{color:#ef4444;border-color:#ef4444}
.tier-pill.fail.on{background:#1a0808;border-color:#ef4444;color:#ef4444;box-shadow:inset 0 0 0 1px #ef4444}
html.light-mode .tier-pill.fail.on{background:#ffeaea;color:#a02020;border-color:#e8a8a8}
.check-item.tiered.nope{background:#140d0d;border-color:#3a1a1a}
html.light-mode .check-item.tiered.nope{background:#fbeaea;border-color:#e8b8b8}
.check-item.tiered{padding:10px 12px}
.check-item.tiered .chkbox{margin-right:10px}
.check-item.tiered .chk-label{margin-right:8px;font-size:.82rem}

/* Callout banner */
.callout{border-radius:13px;padding:14px 40px 14px 16px;margin-bottom:14px;position:relative;border:1px solid;animation:cin .4s ease}
@keyframes cin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.callout.l1{background:linear-gradient(135deg,#1a1708,#14141e);border-color:#3a3010;color:#f5c842}
.callout.l2{background:linear-gradient(135deg,#1f1408,#14141e);border-color:#4a2a10;color:#ff6b35}
.callout.l3{background:linear-gradient(135deg,#1f0808,#14141e);border-color:#5a1a1a;color:#ef4444}
.callout-title{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.callout-title::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.callout-msg{font-size:.8rem;line-height:1.45;color:#d0d0d0;font-weight:500}
.callout-x{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:none;border:none;color:#555;cursor:pointer;font-size:1rem;line-height:1;display:flex;align-items:center;justify-content:center}
.callout-x:hover{color:#aaa;background:rgba(255,255,255,.04)}

/* Quote banner — elite treatment */
